name: Build qutebrowser AppImage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3 python3-dev python3-pip python3-venv \
            qt6-base-dev qt6-webengine-dev qt6-tools-dev libqt6webenginecore6 libqt6webenginewidgets6 \
            libx11-dev libxext-dev libxkbcommon-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev libfreetype-dev libasound2-dev libnss3-dev libglib2.0-dev \
            libpcre2-dev libjpeg-dev libpng-dev libicu-dev libxslt1-dev \
            python3-pyqt6 python3-pyqt6.qtsvg python3-pyqt6.qtwebengine \
            libfuse3-dev libfuse3-3 wget fuse libfuse2 \
            libmysqlclient-dev libqt63drender6 libqt6webview6 libqt63dquickscene2d6 \
            libgl1 libegl1 libopengl0 libglx0 libx11-xcb1 libxcb-glx0 libgbm1 libdrm2 libxcb-dri3-0 libxshmfence1 \
            libpcsclite1 libpulse0 libxcb-cursor0
          sudo modprobe fuse || echo "FUSE module not available, continuing without it"

      - name: Determine Python version
        id: python-version
        run: |
          PYTHON_VERSION=$(python3 --version | cut -d' ' -f2 | cut -d'.' -f1,2)
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV

      - name: Run build script with total AppRun purge
        run: |
          chmod +x qutebrowser-appimage.sh
          sed -i "s|python3.13|python${{ env.PYTHON_VERSION }}|g" qutebrowser-appimage.sh
          # Bundle glibc
          sed -i '/Bundling additional non-Qt libraries/a cp /lib/x86_64-linux-gnu/libc.so.6 "$APPDIR/usr/lib/" || { echo "Failed to copy libc.so.6"; exit 1; }' qutebrowser-appimage.sh
          sed -i '/Bundling additional non-Qt libraries/a cp /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 "$APPDIR/usr/lib/" || { echo "Failed to copy ld-linux-x86-64.so.2"; exit 1; }' qutebrowser-appimage.sh
          # Nuke all AppRun and LOGFILE references
          sed -i '/LOGFILE=/d' qutebrowser-appimage.sh
          sed -i '/Creating AppRun/d' qutebrowser-appimage.sh
          sed -i '/cat << EOF > "$APPDIR\/AppRun"/,/chmod +x "$APPDIR\/AppRun"/d' qutebrowser-appimage.sh
          sed -i '/chmod +x "$APPDIR\/AppRun"/d' qutebrowser-appimage.sh
          # Add a tiny AppRun before desktop file creation
          sed -i '/echo "Creating desktop file"/i \
          echo "Creating AppRun..."; \
          cat << "EOF" > "$APPDIR/AppRun"; \
          #!/bin/bash \
          HERE="$(dirname "$(readlink -f "${0}")")" \
          exec "$HERE/usr/bin/python3" "$HERE/usr/bin/qutebrowser" \
          EOF \
          chmod +x "$APPDIR/AppRun"' qutebrowser-appimage.sh
          # Ensure no stray AppRun persists
          rm -f "$HOME/appimage-workdir/qutebrowser.AppDir/AppRun" || true
          ./qutebrowser-appimage.sh
          cat << "EOF" > "$HOME/appimage-workdir/qutebrowser.AppDir/AppRun"
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/python3" "$HERE/usr/bin/qutebrowser"
          EOF
          chmod +x "$HOME/appimage-workdir/qutebrowser.AppDir/AppRun"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-appimage
          path: ~/qutebrowser-3.2.0-x86_64.AppImage
