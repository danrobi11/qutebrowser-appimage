name: qutebrowser-podman-x11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Podman and runc
        run: |
          sudo apt update
          sudo apt install -y podman runc

      - name: Create Containerfile
        run: |
          cat > Containerfile <<'EOF'
          FROM ubuntu:22.04

          ENV DEBIAN_FRONTEND=noninteractive
          ENV XDG_RUNTIME_DIR=/run/user/1000
          ENV QTWEBENGINE_DISABLE_SANDBOX=1

          RUN apt update && apt install -y \
              python3-pip \
              qutebrowser \
              libqt6webenginecore6 \
              libqt6webenginewidgets6 \
              libqt6gui6 \
              libqt6core6 \
              libqt6opengl6 \
              libqt6network6 \
              libqt6dbus6 \
              libgl1-mesa-dri \
              libglx-mesa0 \
              libx11-xcb1 \
              libxcb-cursor0 \
              libxkbcommon-x11-0 \
              libasound2 \
              libpulse0 \
              dbus \
              && rm -rf /var/lib/apt/lists/*

          RUN useradd -m -u 1000 -g 1000 user && \
              mkdir -p /run/user/1000 && \
              chown user:user /run/user/1000

          USER user
          WORKDIR /home/user

          CMD ["bash", "-c", "dbus-run-session -- python3 -m qutebrowser"]
          EOF

      - name: Create Launch Script
        run: |
          cat > launch-qutebrowser.sh <<'EOF'
          #!/bin/bash
          set -e

          USERNAME=${USER:-$(whoami)}
          HOST_UID=$(id -u)
          HOST_GID=$(id -g)
          echo "Host username: $USERNAME (UID: $HOST_UID, GID: $HOST_GID)"

          SCRIPT_DIR="$(dirname "$(realpath "$0")")"
          cd "$SCRIPT_DIR" || { echo "Failed to cd to $SCRIPT_DIR"; exit 1; }
          echo "Working directory: $(/bin/pwd)"

          RUNTIME_DIR="$HOME/.run"
          mkdir -p "$RUNTIME_DIR" && chmod 700 "$RUNTIME_DIR"
          export XDG_RUNTIME_DIR="$RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR: $XDG_RUNTIME_DIR"

          if [ -z "$DISPLAY" ]; then
            echo "DISPLAY unset—trying :0"
            export DISPLAY=:0
          fi
          if ! xset q >/dev/null 2>&1; then
            echo "Cannot connect to X server $DISPLAY—run from an X session"
            exit 1
          fi
          echo "Granting X11 access..."
          xhost +SI:localuser:$USER

          echo "Loading container image..."
          podman load -i "$SCRIPT_DIR/qutebrowser-x11.tar"

          AUDIO_ARGS=""
          AUDIO_ENV=""
          AUDIO_GID=$(getent group audio | cut -d: -f3 || echo "29")
          if [ -d "/dev/snd" ]; then
            echo "ALSA devices found"
            AUDIO_ARGS="--device /dev/snd:/dev/snd --group-add $AUDIO_GID"
            if [ -d "/run/user/$HOST_UID/pulse" ]; then
              echo "PulseAudio socket found, using PulseAudio"
              AUDIO_ARGS="$AUDIO_ARGS -v /run/user/$HOST_UID/pulse:/run/user/1000/pulse"
            else
              echo "PulseAudio not found, falling back to ALSA"
              AUDIO_ENV="-e QT_MULTIMEDIA_PREFERRED_PLUGINS=alsa"
            fi
          else
            echo "No audio devices found, sound may not work"
          fi

          GPU_ARGS=""
          GPU_FALLBACK=""
          GPU_GID=$(getent group video | cut -d: -f3 || echo "44")
          if [ -d "/dev/dri" ]; then
            echo "GPU devices found"
            for dri_dev in /dev/dri/card0 /dev/dri/renderD128; do
              if [ -e "$dri_dev" ]; then
                GPU_ARGS="$GPU_ARGS --device $dri_dev"
              fi
            done
            if [ -n "$GPU_ARGS" ]; then
              GPU_ARGS="$GPU_ARGS --group-add $GPU_GID"
            else
              echo "No valid GPU devices, using software rendering"
              GPU_FALLBACK="--qt-flag disable-gpu"
            fi
          else
            echo "No GPU devices, using software rendering"
            GPU_FALLBACK="--qt-flag disable-gpu"
          fi

          echo "Launching qutebrowser..."
          podman run --rm -it \
            -e DISPLAY=$DISPLAY \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            -v "$HOME:/home/$USERNAME:rw,z" \
            -e HOME="/home/$USERNAME" \
            -e XDG_RUNTIME_DIR=/run/user/1000 \
            -e XDG_CONFIG_HOME="/home/$USERNAME/.config" \
            -e XDG_DATA_HOME="/home/$USERNAME/.local/share" \
            -e XDG_CACHE_HOME="/home/$USERNAME/.cache" \
            $AUDIO_ARGS \
            $AUDIO_ENV \
            $GPU_ARGS \
            --userns=keep-id \
            --security-opt label=disable \
            localhost/qutebrowser-x11:latest \
            --set content.local_content_can_access_file_urls true \
            $GPU_FALLBACK
          EOF
          chmod +x launch-qutebrowser.sh

      - name: Build Podman Container
        run: |
          sudo podman build --runtime /usr/bin/runc -t qutebrowser-x11:latest -f Containerfile .
          sudo podman images

      - name: Save Container Image
        run: |
          sudo podman save -o qutebrowser-x11.tar qutebrowser-x11:latest

      - name: Generate SHA256 Checksum
        run: |
          sha256sum qutebrowser-x11.tar > qutebrowser-x11.tar.sha256
          cat qutebrowser-x11.tar.sha256

      - name: Test Container (Basic)
        run: |
          sudo podman run --rm localhost/qutebrowser-x11:latest --version
          echo "Container runs and qutebrowser version printed successfully"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-x11-podman
          path: |
            qutebrowser-x11.tar
            launch-qutebrowser.sh
            qutebrowser-x11.tar.sha256
          if-no-files-found: error
