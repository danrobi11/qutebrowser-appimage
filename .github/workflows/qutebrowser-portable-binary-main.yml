name: Build Portable Qutebrowser VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-system-x86 qemu-utils libpulse-dev x11-xserver-utils alsa-utils

    - name: Create Minimal Ubuntu Chroot
      run: |
        sudo debootstrap --arch=amd64 jammy chroot http://archive.ubuntu.com/ubuntu/
        sudo chroot chroot apt-get update
        sudo chroot chroot apt-get install -y --no-install-recommends software-properties-common # Use --no-install-recommends
        sudo chroot chroot add-apt-repository universe
        sudo chroot chroot apt-get update
        # Install minimal X and drivers, including virtio video
        sudo chroot chroot apt-get install -y --no-install-recommends qutebrowser linux-image-generic xserver-xorg-core xinit xserver-xorg-video-virtio xterm # Added video driver and xterm for testing
        sudo chroot chroot apt-get clean
        sudo chroot chroot bash -c "echo 'qutebrowser-vm' > /etc/hostname"
        sudo chroot chroot bash -c "echo 'root:root' | chpasswd"

        # --- FIXED: Revised start_qutebrowser.sh ---
        sudo bash -c "cat > chroot/root/start_qutebrowser.sh" << 'EOF'
        #!/bin/bash
        echo "--- Running start_qutebrowser.sh ---"

        # Mount host share
        echo "Creating /mnt/host..."
        mkdir -p /mnt/host
        echo "Mounting hostshare..."
        mount -t 9p -o trans=virtio,version=9p2000.L hostshare /mnt/host
        if [ $? -ne 0 ]; then echo "Mount failed!"; fi # Basic check

        # Set display
        export DISPLAY=:0
        echo "DISPLAY set to $DISPLAY"

        # Start Xorg in the background
        echo "Starting Xorg..."
        /usr/bin/Xorg $DISPLAY &
        XORG_PID=$!

        # Wait for X socket to appear (more reliable than sleep)
        echo "Waiting for X socket /tmp/.X11-unix/X0..."
        while [ ! -e /tmp/.X11-unix/X0 ]; do
          sleep 0.5
          # Check if Xorg died
          if ! ps -p $XORG_PID > /dev/null; then
            echo "Xorg process died unexpectedly!"
            # Keep script running maybe? Or exit? Let's just proceed for now.
            break
          fi
        done
        echo "X socket found."

        # Launch Qutebrowser
        echo "Launching Qutebrowser..."
        /usr/bin/qutebrowser

        # Fallback/debug shell if qutebrowser exits
        echo "Qutebrowser exited. Starting fallback shell."
        # Optional: start xterm here instead if you prefer graphical debugging
        # xterm &
        exec /bin/bash
        EOF

        sudo chroot chroot chmod +x /root/start_qutebrowser.sh
        # Remove .bash_profile reliance, we use init= directly now
        sudo rm -f chroot/root/.bash_profile

    - name: Package VM Components
      run: |
        sudo cp chroot/boot/vmlinuz-* kernel
        sudo cp chroot/boot/initrd.img-* initrd
        echo "Chroot size:"
        sudo du -sh chroot
        sudo dd if=/dev/zero of=filesystem.img bs=1M count=4096
        sudo mkfs.ext4 -F filesystem.img
        sudo mkdir -p /mnt/chroot # Use -p
        sudo mount -o loop filesystem.img /mnt/chroot
        echo "Copying chroot contents to filesystem image..."
        sudo cp -a chroot/* /mnt/chroot/
        echo "Syncing..."
        sync # Ensure data is written before unmount
        sudo umount /mnt/chroot
        echo "Packaging kernel, initrd, filesystem..."
        sudo tar -czf qutebrowser-vm.tar.gz kernel initrd filesystem.img
        ls -lh kernel initrd filesystem.img qutebrowser-vm.tar.gz

    - name: Create Simple Run Script
      # Run script content needs updating below, this step just creates the file
      run: |
        cat > run-qutebrowser-vm.sh << 'EOF'
        # Content will be generated in the next step
        EOF
        chmod +x run-qutebrowser-vm.sh

    - name: Update Run Script Content
      # Separate step to avoid issues with complex quoting inside the previous one
      run: |
        cat > run-qutebrowser-vm.sh << 'EOF'
        #!/bin/bash
        set -e

        QEMU_BIN="qemu-system-x86_64"

        command -v "$QEMU_BIN" >/dev/null 2>&1 || {
          echo "Error: $QEMU_BIN not found."
          echo "Please install QEMU first (e.g., 'sudo xbps-install -S qemu' on Void)."
          exit 1
        }

        SCRIPT_DIR="$(dirname "$(readlink -f "$0")")"
        KERNEL="$SCRIPT_DIR/kernel"
        INITRD="$SCRIPT_DIR/initrd"
        FS="$SCRIPT_DIR/filesystem.img"

        [ -f "$KERNEL" ] && [ -f "$INITRD" ] && [ -f "$FS" ] || {
          echo "Error: Missing VM components (kernel, initrd, or filesystem.img) in $SCRIPT_DIR."
          exit 1
        }

        HOST_SHARE="$HOME"
        GUEST_MOUNT="/mnt/host"
        echo "Sharing your home directory ($HOST_SHARE) at $GUEST_MOUNT in Qutebrowser."
        echo "Open files with 'file://$GUEST_MOUNT/path/to/file' (e.g., 'file:///mnt/host/Documents/test.html')."
        echo "Connecting to SPICE display on port 5900..."
        echo "Run: 'spicy -h 127.0.0.1 -p 5900' to see Qutebrowser (install with 'sudo xbps-install -S spice-gtk')."
        echo "VM console output will appear below:"

        # --- FIXED: Use init= for startup script, add -serial stdio ---
        QEMU_ARGS=(
          -kernel "$KERNEL"
          -initrd "$INITRD"
          -drive "file=$FS,format=raw,if=virtio"
          -append "root=/dev/vda console=ttyS0 rw init=/root/start_qutebrowser.sh" # Run script directly
          -m 1G # Memory size
          -cpu host # Use host CPU features
          -enable-kvm # Use hardware acceleration
          -virtfs "local,path=$HOST_SHARE,mount_tag=hostshare,security_model=passthrough,id=hostshare" # Added id
          -vga virtio # Use virtio GPU
          -display spice-app # Use SPICE display
          # -spice "port=5900,addr=127.0.0.1,disable-ticketing=on" # Replaced by -display spice-app for better integration
          -serial stdio # Route guest serial console to host terminal
          -soundhw hda # Add a basic sound device
        )

        echo "Starting Qutebrowser VM..."
        "$QEMU_BIN" "${QEMU_ARGS[@]}"
        # Removed backgrounding (&) and trap/wait, run QEMU in foreground
        # Ctrl+C in the terminal will now stop QEMU directly.
        echo "QEMU exited."
        EOF

    - name: Bundle Package
      run: |
        # Ensure run script is included
        sudo tar -czf qutebrowser-vm.tar.gz kernel initrd filesystem.img run-qutebrowser-vm.sh
        echo "--- Package Contents ---"
        sudo tar -tvf qutebrowser-vm.tar.gz
        echo "------------------------"
        ls -lh qutebrowser-vm.tar.gz
        tar -ztvf qutebrowser-vm.tar.gz | awk '{sum+=$3} END {printf "Estimated Uncompressed Size: %.2f MB\n", sum/1024/1024}'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-vm
        path: qutebrowser-vm.tar.gz
