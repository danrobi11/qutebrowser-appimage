name: Build qutebrowser with QEMU and glibc static

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git wget xz-utils \
          python3-dev python3-pip \
          libx11-dev libxrender-dev libgl1-mesa-dev \
          libssl-dev zlib1g-dev libpng-dev \
          qemu-user \
          g++-10 \
          libxcb1-dev libxcb-xinerama0-dev libxcb-xkb-dev libxkbcommon-x11-dev \
          libxcb-util-dev libxcb-keysyms1-dev libxcb-image0-dev libxcb-render-util0-dev libxkbcommon-dev \
          libxcb-sync-dev libxcb-icccm4-dev libxcb-randr0-dev libxcb-shape0-dev \ # More XCB for xcb_syslibs
          gperf bison flex ninja-build pkg-config python2 libnss3-dev # WebEngine tools + NSS
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 100 # Set Python 2 as default

    - name: Install Python dependencies
      run: |
        pip3 install --user setuptools pyqt5

    - name: Download and build static Qt
      run: |
        wget https://download.qt.io/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz
        tar xf qt-everywhere-src-5.15.2.tar.xz
        cd qt-everywhere-src-5.15.2
        ./configure -static -prefix /opt/qt-static -opensource -confirm-license \
          -xcb -no-opengl -skip qt3d -skip qtmultimedia
        make -j$(nproc)
        sudo make install

    - name: Build static ffmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git
        cd ffmpeg
        ./configure --enable-static --disable-shared --prefix=/opt/ffmpeg-static
        make -j$(nproc)
        sudo make install

    - name: Clone and build qutebrowser
      run: |
        git clone https://github.com/qutebrowser/qutebrowser.git
        cd qutebrowser
        python3 setup.py build --qt-dir=/opt/qt-static --ffmpeg-dir=/opt/ffmpeg-static
        # Static link fallback
        g++ -static -o qutebrowser-static $(find build -name "*.o") \
          -L/opt/qt-static/lib -L/opt/ffmpeg-static/lib \
          -lQt5WebEngine -lQt5WebEngineCore -lQt5Quick -lQt5Gui -lQt5Core \
          -lX11 -lavcodec -lavformat -lavutil -lswscale
        strip qutebrowser-static

    - name: Create run script
      run: |
        cat > run-qutebrowser.sh << 'EOF'
        #!/bin/bash
        QUTEBROWSER_STATIC="$(dirname "$0")/qutebrowser-static"
        QEMU_X86_64="$(dirname "$0")/qemu-x86_64"
        if [ -z "$DISPLAY" ] && [ -z "$WAYLAND_DISPLAY" ]; then
          echo "Error: No graphical environment detected."
          exit 1
        fi
        X11_SOCKET="/tmp/.X11-unix"
        X11_ARGS=""
        if [ -n "$DISPLAY" ] && [ -d "$X11_SOCKET" ]; then
          DISPLAY="${DISPLAY:-:0}"
          X11_ARGS="-E DISPLAY=$DISPLAY -v $X11_SOCKET:$X11_SOCKET"
          echo "Running on X11 with DISPLAY=$DISPLAY"
        elif [ -n "$WAYLAND_DISPLAY" ]; then
          WAYLAND_ARGS="-E WAYLAND_DISPLAY=$WAYLAND_DISPLAY"
          echo "Running on Wayland with WAYLAND_DISPLAY=$WAYLAND_DISPLAY"
        fi
        HOME_DIR="$HOME"
        if [ -d "$HOME_DIR" ]; then
          HOME_ARGS="-E HOME=$HOME_DIR -v $HOME_DIR:$HOME_DIR"
          echo "Mounting home directory: $HOME_DIR"
        fi
        chmod +x "$QEMU_X86_64" "$QUTEBROWSER_STATIC" 2>/dev/null
        "$QEMU_X86_64" $X11_ARGS $WAYLAND_ARGS $HOME_ARGS "$QUTEBROWSER_STATIC" "$@"
        EOF
        chmod +x run-qutebrowser.sh

    - name: Bundle package
      run: |
        cp /usr/bin/qemu-x86_64 .
        tar -czf qutebrowser-qemu.tar.gz qutebrowser-static qemu-x86_64 run-qutebrowser.sh

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-qemu
        path: qutebrowser-qemu.tar.gz
