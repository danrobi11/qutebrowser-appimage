name: qutebrowser-portable-binary-main.yml

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pyqt5.qtwebengine \
            python3-pyqt5.qtwebchannel \
            python3-pyqt5.qtsvg \
            python3-pyqt5.qtopengl \
            python3-pyqt5 \
            qtwebengine5-dev \
            qt5-qmltooling-plugins \
            qtdeclarative5-dev \
            qtpositioning5-dev \
            qtdeclarative5-dev-tools \
            libqt5svg5-dev \
            libqt5webenginewidgets5 \
            libqt5webenginecore5 \
            libqt5webchannel5-dev \
            libqt5quickwidgets5 \
            libqt5opengl5-dev \
            libqt5designer5 \
            libqt5positioningquick5 \
            libqt5quicktest5 \
            libqt5quickparticles5 \
            libqt5svg5 \
            python3-pip \
            patchelf

      - name: Install Qutebrowser via pip
        run: |
          pip install --prefix=$HOME/.local qutebrowser

      - name: Bundle Qutebrowser binary and dependencies
        run: |
          mkdir -p $HOME/qutebrowser-bundle/usr/{bin,lib,share/applications}

          # Copy Python binary
          cp "$(which python3)" $HOME/qutebrowser-bundle/usr/bin/python3
          chmod +x $HOME/qutebrowser-bundle/usr/bin/python3

          # Copy shared libs used by Python
          ldd "$(which python3)" | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read lib; do
            echo "Copying $lib"
            cp -v "$lib" $HOME/qutebrowser-bundle/usr/lib/
          done

          # Copy linker (ignore error if already copied)
          cp -v /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 $HOME/qutebrowser-bundle/usr/lib/ || true
          cp -v /lib64/ld-linux-x86-64.so.2 $HOME/qutebrowser-bundle/usr/lib/ || true

          # Copy site-packages (Qutebrowser + deps)
          find $HOME/.local/lib -type d -name "site-packages" -exec cp -r {} $HOME/qutebrowser-bundle/usr/lib/ \;

      - name: List bundle contents
        run: find $HOME/qutebrowser-bundle
