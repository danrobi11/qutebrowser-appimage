name: qutebrowser-portable-binary-main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pyqt5.qtwebengine \
            python3-pyqt5.qtwebchannel \
            python3-pyqt5.qtsvg \
            python3-pyqt5.qtopengl \
            python3-pyqt5 \
            qtwebengine5-dev \
            qt5-qmltooling-plugins \
            qtdeclarative5-dev \
            qtpositioning5-dev \
            qtdeclarative5-dev-tools \
            libqt5svg5-dev \
            libqt5webenginewidgets5 \
            libqt5webenginecore5 \
            libqt5webchannel5-dev \
            libqt5quickwidgets5 \
            libqt5opengl5-dev \
            libqt5designer5 \
            libqt5positioningquick5 \
            libqt5quicktest5 \
            libqt5quickparticles5 \
            libqt5svg5 \
            python3-pip \
            patchelf

      - name: Install Qutebrowser via pip into --target
        run: |
          export BUNDLE_DIR=$HOME/qutebrowser-bundle
          export TARGET=$BUNDLE_DIR/usr/lib/python3.10/site-packages
          mkdir -p "$TARGET"
          pip install --target="$TARGET" qutebrowser

      - name: Bundle Qutebrowser binary and dependencies
        run: |
          export BUNDLE_DIR=$HOME/qutebrowser-bundle
          mkdir -p $BUNDLE_DIR/usr/{bin,lib,share/applications,lib/python3.10}

          # Copy Python binary
          cp "$(which python3)" $BUNDLE_DIR/usr/bin/python3
          chmod +x $BUNDLE_DIR/usr/bin/python3

          # Copy shared libraries used by Python
          ldd "$(which python3)" | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read lib; do
            echo "Copying $lib"
            cp -v "$lib" $BUNDLE_DIR/usr/lib/
          done

          # Copy libpython
          find /usr/lib -name "libpython3.10.so*" -exec cp -v {} $BUNDLE_DIR/usr/lib/ \;

          # Copy Python stdlib
          stdlib_dir=$(python3 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          echo "Copying stdlib from $stdlib_dir"
          cp -r "$stdlib_dir" $BUNDLE_DIR/usr/lib/

          # Create launcher script using printf
          printf '%s\n' '#!/bin/sh' \
            'DIR=$(dirname "$0")' \
            'export PYTHONHOME="$DIR/../lib"' \
            'export PYTHONPATH="$PYTHONHOME/python3.10/site-packages"' \
            'exec "$DIR/python3" -s -m qutebrowser "$@"' \
            > $BUNDLE_DIR/usr/bin/qutebrowser

          chmod +x $BUNDLE_DIR/usr/bin/qutebrowser

      - name: List bundle contents
        run: |
          find $HOME/qutebrowser-bundle

      - name: Create .tar.gz archive
        run: |
          cd $HOME
          tar -czvf qutebrowser-portable.tar.gz qutebrowser-bundle
          ls -lh qutebrowser-portable.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: ${{ env.HOME }}/qutebrowser-portable.tar.gz
          if-no-files-found: error
