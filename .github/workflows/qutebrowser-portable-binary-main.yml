name: qutebrowser-portable-binary-main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build and runtime dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3.10 \
            python3-pip \
            python3-venv \ # Good practice to use venv
            build-essential \
            patchelf \
            wget \
            libglib2.0-0 # Often needed by Qt/Python libs

      - name: Create and activate virtual environment
        run: |
          python3.10 -m venv $HOME/qute-venv
          source $HOME/qute-venv/bin/activate

      - name: Install Qutebrowser and PyQt5/WebEngine into venv
        run: |
          source $HOME/qute-venv/bin/activate
          pip install --upgrade pip
          pip install --no-cache-dir qutebrowser pyqt5 pyqtwebengine
          pip show qutebrowser || exit 1

      - name: Prepare bundle structure
        run: |
          mkdir -p $HOME/qutebrowser-bundle/usr/{bin,lib,share}
          mkdir -p $HOME/qutebrowser-bundle/qt5 # For Qt resources
          mkdir -p $HOME/qutebrowser-bundle/glibc
          export BUNDLE_DIR="$HOME/qutebrowser-bundle"
          export BUNDLE_USR_LIB="$BUNDLE_DIR/usr/lib"
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> $GITHUB_ENV
          echo "BUNDLE_USR_LIB=$BUNDLE_USR_LIB" >> $GITHUB_ENV

      - name: Bundle Python interpreter and standard library
        run: |
          source $HOME/qute-venv/bin/activate
          # Copy interpreter
          cp "$(which python3.10)" "$BUNDLE_DIR/usr/bin/python3"
          # Copy essential Python libs (sysconfig can find others)
          PYTHON_LIB_DIR=$(python3.10 -c "import sysconfig; print(sysconfig.get_path('platlib'))")
          cp -vL "$PYTHON_LIB_DIR"/lib-dynload/zlib*.so "$BUNDLE_USR_LIB/"
          # Copy entire standard library (needed for PYTHONHOME)
          PYTHON_STDLIB=$(python3.10 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          PYTHON_PLATSTDLIB=$(python3.10 -c "import sysconfig; print(sysconfig.get_path('platstdlib'))")
          mkdir -p "$BUNDLE_DIR/usr/lib/python3.10"
          cp -ar "$PYTHON_STDLIB"/* "$BUNDLE_DIR/usr/lib/python3.10/"
          # platstdlib might contain overrides or specific modules, merge them carefully
          if [ "$PYTHON_STDLIB" != "$PYTHON_PLATSTDLIB" ]; then
            cp -ar "$PYTHON_PLATSTDLIB"/* "$BUNDLE_DIR/usr/lib/python3.10/"
          fi
          # Copy site-packages from venv
          cp -ar $HOME/qute-venv/lib/python3.10/site-packages/* "$BUNDLE_DIR/usr/lib/python3.10/site-packages" || echo "No site-packages found?"

      - name: Bundle Glibc / Dynamic Linker
        run: |
          # Copy the dynamic linker
          LD_SO=$(ldd /bin/ls | grep 'ld-linux' | awk '{print $1}')
          if [ -z "$LD_SO" ]; then LD_SO=$(find /lib* /usr/lib* -name 'ld-*.so.?' -print -quit); fi # Fallback find
          echo "Found dynamic linker: $LD_SO"
          if [ -z "$LD_SO" ]; then echo "ERROR: Cannot find dynamic linker!"; exit 1; fi
          cp -vL "$LD_SO" "$BUNDLE_DIR/glibc/"
          # Copy essential libc components needed by the linker and basic apps
          LIBC_PATH=$(ldd /bin/ls | grep libc.so | awk '{ print $3 }')
          LIBPTHREAD_PATH=$(ldd /bin/ls | grep libpthread.so | awk '{ print $3 }')
          LIBDL_PATH=$(ldd /bin/ls | grep libdl.so | awk '{ print $3 }')
          LIBRT_PATH=$(ldd /bin/ls | grep librt.so | awk '{ print $3 }') # Often needed
          LIBM_PATH=$(ldd /bin/ls | grep libm.so | awk '{ print $3 }') # Math library
          cp -vL "$LIBC_PATH" "$BUNDLE_DIR/glibc/"
          cp -vL "$LIBPTHREAD_PATH" "$BUNDLE_DIR/glibc/"
          cp -vL "$LIBDL_PATH" "$BUNDLE_DIR/glibc/"
          if [ -n "$LIBRT_PATH" ]; then cp -vL "$LIBRT_PATH" "$BUNDLE_DIR/glibc/"; fi
          if [ -n "$LIBM_PATH" ]; then cp -vL "$LIBM_PATH" "$BUNDLE_DIR/glibc/"; fi
          # Ensure executable permission for the linker
          chmod +x "$BUNDLE_DIR/glibc/$(basename $LD_SO)"

      - name: Recursively find and bundle ALL required shared libraries
        run: |
          source $HOME/qute-venv/bin/activate
          declare -A COPIED_LIBS # Keep track of copied libs to avoid infinite loops
          TO_PROCESS=("$BUNDLE_DIR/usr/bin/python3")

          # Add shared objects from site-packages (PyQt5, etc.)
          find "$BUNDLE_DIR/usr/lib/python3.10/site-packages" -name '*.so' -print0 | while IFS= read -r -d $'\0' file; do
            TO_PROCESS+=("$file")
          done

          # Add QtWebEngineProcess if found (adjust path if needed)
          QTWEBENGINEPROCESS_PATH=$(find /usr/lib* -name QtWebEngineProcess -print -quit)
          if [[ -n "$QTWEBENGINEPROCESS_PATH" && -x "$QTWEBENGINEPROCESS_PATH" ]]; then
            echo "Found QtWebEngineProcess at $QTWEBENGINEPROCESS_PATH"
            cp -v "$QTWEBENGINEPROCESS_PATH" "$BUNDLE_DIR/usr/bin/"
            TO_PROCESS+=("$BUNDLE_DIR/usr/bin/QtWebEngineProcess")
          else
            echo "Warning: QtWebEngineProcess not found or not executable."
          fi

          processed_idx=0
          while [ $processed_idx -lt ${#TO_PROCESS[@]} ]; do
            current_file="${TO_PROCESS[$processed_idx]}"
            processed_idx=$((processed_idx + 1))

            echo "Processing dependencies for: $current_file"
            if [[ ! -f "$current_file" || -L "$current_file" ]]; then
               echo "  Skipping (not a regular file or is a symlink): $current_file"
               continue
            fi

            # Run ldd and parse libraries
            ldd "$current_file" | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read -r lib_path; do
              # Skip linux-vdso.so.1 and already copied libs
              if [[ "$lib_path" == *"linux-vdso.so.1"* || -v COPIED_LIBS["$(basename "$lib_path")"] ]]; then
                  continue
              fi

              # Skip libs already present in the bundle target dir (usr/lib)
              if [ -f "$BUNDLE_USR_LIB/$(basename "$lib_path")" ]; then
                  if [[ ! -v COPIED_LIBS["$(basename "$lib_path")"] ]]; then
                      echo "  Already in bundle: $(basename "$lib_path")"
                      COPIED_LIBS["$(basename "$lib_path")"]=1
                      # Add it to process queue *if it wasn't added before* to check ITS dependencies
                      TO_PROCESS+=("$BUNDLE_USR_LIB/$(basename "$lib_path")")
                  fi
                  continue
              fi

              # Skip glibc libs we handle separately (they should end up in glibc/ dir)
              if [[ "$lib_path" == *"/libc.so"* || \
                    "$lib_path" == *"/libpthread.so"* || \
                    "$lib_path" == *"/libdl.so"* || \
                    "$lib_path" == *"/librt.so"* || \
                    "$lib_path" == *"/libm.so"* || \
                    "$lib_path" == *"/ld-linux"* ]]; then
                  echo "  Skipping glibc lib (handled separately): $lib_path"
                  continue
              fi

              # Copy the library if it exists
              if [ -f "$lib_path" ]; then
                  echo "  Copying: $lib_path -> $BUNDLE_USR_LIB/"
                  cp -vL "$lib_path" "$BUNDLE_USR_LIB/"
                  COPIED_LIBS["$(basename "$lib_path")"]=1
                  # Add the *copied* library to the queue to check its dependencies
                  TO_PROCESS+=("$BUNDLE_USR_LIB/$(basename "$lib_path")")
              else
                  echo "  Warning: Dependency not found: $lib_path for $current_file"
              fi
            done
          done

          echo "Dependency processing complete. Found and copied ${#COPIED_LIBS[@]} unique libraries."

      - name: Bundle Qt Resources (Example - adjust paths as needed)
        run: |
          # Find Qt installation path used by PyQt
          QT_PLUGIN_PATH=$(python3.10 -c "from PyQt5.QtCore import QLibraryInfo; print(QLibraryInfo.location(QLibraryInfo.PluginsPath))")
          QT_TRANSLATIONS_PATH=$(python3.10 -c "from PyQt5.QtCore import QLibraryInfo; print(QLibraryInfo.location(QLibraryInfo.TranslationsPath))")
          QT_DATA_PATH=$(python3.10 -c "from PyQt5.QtCore import QLibraryInfo; print(QLibraryInfo.location(QLibraryInfo.DataPath))") # For qt.conf, etc.
          QT_LIBS_PATH=$(python3.10 -c "from PyQt5.QtCore import QLibraryInfo; print(QLibraryInfo.location(QLibraryInfo.LibrariesPath))") # Often contains qt.conf

          echo "Qt Plugin Path: $QT_PLUGIN_PATH"
          echo "Qt Translations Path: $QT_TRANSLATIONS_PATH"
          echo "Qt Data Path: $QT_DATA_PATH"
          echo "Qt Libs Path: $QT_LIBS_PATH"

          # Copy essential plugins (platforms, imageformats, etc.)
          if [ -d "$QT_PLUGIN_PATH" ]; then
            mkdir -p "$BUNDLE_DIR/qt5/plugins"
            cp -a "$QT_PLUGIN_PATH/platforms" "$BUNDLE_DIR/qt5/plugins/" || echo "Warning: No platforms plugins found"
            cp -a "$QT_PLUGIN_PATH/imageformats" "$BUNDLE_DIR/qt5/plugins/" || echo "Warning: No imageformats plugins found"
            # Add other plugins if needed (e.g., printsupport, xcbglintegrations)
            if [ -d "$QT_PLUGIN_PATH/xcbglintegrations" ]; then cp -a "$QT_PLUGIN_PATH/xcbglintegrations" "$BUNDLE_DIR/qt5/plugins/"; fi
            if [ -d "$QT_PLUGIN_PATH/printsupport" ]; then cp -a "$QT_PLUGIN_PATH/printsupport" "$BUNDLE_DIR/qt5/plugins/"; fi
          fi

          # Copy Qt translations
          if [ -d "$QT_TRANSLATIONS_PATH" ]; then
            mkdir -p "$BUNDLE_DIR/qt5/translations"
            cp -a "$QT_TRANSLATIONS_PATH"/* "$BUNDLE_DIR/qt5/translations/" || echo "Warning: No Qt translations found"
          fi

          # Copy QtWebEngine resources (locales, etc.) - VERY IMPORTANT
          # These might be in DataPath or a specific webengine dir
          QTWEBENGINE_RESOURCES_PATH=$(find "$QT_DATA_PATH" /usr/share /usr/lib* -name "*resources*.pak" -printf '%h\n' -quit)
          if [ -z "$QTWEBENGINE_RESOURCES_PATH" ]; then
              QTWEBENGINE_RESOURCES_PATH=$(find /usr/lib* -path "*QtWebEngineCore*" -name "*resources*.pak" -printf '%h\n' -quit)
          fi

          if [ -n "$QTWEBENGINE_RESOURCES_PATH" ] && [ -d "$QTWEBENGINE_RESOURCES_PATH" ]; then
            echo "Found QtWebEngine resources at: $QTWEBENGINE_RESOURCES_PATH"
            mkdir -p "$BUNDLE_DIR/qt5/resources"
            cp -a "$QTWEBENGINE_RESOURCES_PATH"/* "$BUNDLE_DIR/qt5/resources/" || echo "Warning: Failed to copy QtWebEngine resources"
            # Also check for locales subdir
            QTWEBENGINE_LOCALES_PATH="${QTWEBENGINE_RESOURCES_PATH}/locales"
             if [ ! -d "$BUNDLE_DIR/qt5/resources/locales" ] && [ -d "$QTWEBENGINE_LOCALES_PATH" ]; then
                 mkdir -p "$BUNDLE_DIR/qt5/resources/locales"
                 cp -a "$QTWEBENGINE_LOCALES_PATH"/* "$BUNDLE_DIR/qt5/resources/locales/" || echo "Warning: Failed to copy QtWebEngine locales"
             fi
          else
            echo "Warning: Could not find QtWebEngine resources directory (.pak files, locales)."
            echo "         WebEngine might fail to render pages."
          fi

          # Create or copy qt.conf
          QT_CONF_PATH="$QT_LIBS_PATH/qt.conf"
          if [ -f "$QT_CONF_PATH" ]; then
              echo "Copying existing qt.conf from $QT_CONF_PATH"
              cp "$QT_CONF_PATH" "$BUNDLE_DIR/usr/bin/"
          else
              echo "Creating qt.conf"
              cat > "$BUNDLE_DIR/usr/bin/qt.conf" <<EOF
[Paths]
Prefix = ..
Plugins = ../qt5/plugins
Translations = ../qt5/translations
Data = ../qt5
Resources = ../qt5/resources
EOF
          fi
          # Ensure qt.conf is readable
          chmod +r "$BUNDLE_DIR/usr/bin/qt.conf"

      - name: Patch ELF files (Interpreter and RUNPATH)
        run: |
          LD_SO_NAME=$(basename "$BUNDLE_DIR/glibc"/ld-*.so.?)
          echo "Using dynamic linker: $LD_SO_NAME"

          # Patch Python interpreter
          echo "Patching interpreter for $BUNDLE_DIR/usr/bin/python3"
          patchelf --set-interpreter "$BUNDLE_DIR/glibc/$LD_SO_NAME" "$BUNDLE_DIR/usr/bin/python3"
          patchelf --force-rpath --set-rpath '$ORIGIN/../lib:$ORIGIN/../../glibc' "$BUNDLE_DIR/usr/bin/python3"
          echo "Interpreter after patch:"
          readelf -d "$BUNDLE_DIR/usr/bin/python3" | grep 'program interpreter' || true
          readelf -d "$BUNDLE_DIR/usr/bin/python3" | grep 'RPATH\|RUNPATH' || true

          # Patch QtWebEngineProcess if it exists
          if [ -f "$BUNDLE_DIR/usr/bin/QtWebEngineProcess" ]; then
            echo "Patching interpreter for $BUNDLE_DIR/usr/bin/QtWebEngineProcess"
            patchelf --set-interpreter "$BUNDLE_DIR/glibc/$LD_SO_NAME" "$BUNDLE_DIR/usr/bin/QtWebEngineProcess"
            patchelf --force-rpath --set-rpath '$ORIGIN/../lib:$ORIGIN/../../glibc' "$BUNDLE_DIR/usr/bin/QtWebEngineProcess"
            echo "QtWebEngineProcess after patch:"
            readelf -d "$BUNDLE_DIR/usr/bin/QtWebEngineProcess" | grep 'program interpreter' || true
            readelf -d "$BUNDLE_DIR/usr/bin/QtWebEngineProcess" | grep 'RPATH\|RUNPATH' || true
          fi

          # Patch all bundled libraries in usr/lib
          echo "Patching libraries in $BUNDLE_USR_LIB"
          find "$BUNDLE_USR_LIB" -maxdepth 1 -type f -name '*.so*' -print -exec patchelf --force-rpath --set-rpath '$ORIGIN:$ORIGIN/../glibc' {} \;
          # Also patch libraries inside site-packages (like PyQt's .so files)
          echo "Patching libraries in $BUNDLE_DIR/usr/lib/python3.10/site-packages"
          find "$BUNDLE_DIR/usr/lib/python3.10/site-packages" -type f -name '*.so' -print -exec patchelf --force-rpath --set-rpath '$ORIGIN/../../../lib:$ORIGIN/../../../glibc' {} \;
          find "$BUNDLE_DIR/usr/lib/python3.10/site-packages" -type f -name '*.so.*' -print -exec patchelf --force-rpath --set-rpath '$ORIGIN/../../../lib:$ORIGIN/../../../glibc' {} \;


      - name: Create launcher script
        run: |
          cat > "$BUNDLE_DIR/usr/bin/qutebrowser.sh" <<'EOF'
          #!/bin/bash
          # Get the directory containing this script
          SCRIPT_DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" &> /dev/null && pwd )"
          BUNDLE_ROOT="$SCRIPT_DIR/.."

          # Set environment variables for Python and Qt
          export PYTHONHOME="$BUNDLE_ROOT/usr"
          # PYTHONPATH might not be strictly needed if site-packages are in standard location relative to PYTHONHOME
          # export PYTHONPATH="$BUNDLE_ROOT/usr/lib/python3.10/site-packages"
          export QT_PLUGIN_PATH="$BUNDLE_ROOT/qt5/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$BUNDLE_ROOT/qt5/plugins/platforms"
          # Tell Qt where to find qt.conf (usually its executable dir)
          export QTCONF_PATH="$SCRIPT_DIR/qt.conf"

          # Define path to the bundled dynamic linker and library path
          LD_SO="$BUNDLE_ROOT/glibc/$(basename $BUNDLE_ROOT/glibc/ld-*.so.?)"
          LD_LIBRARY_PATH_ARG="$BUNDLE_ROOT/usr/lib:$BUNDLE_ROOT/glibc"

          echo "--- Launching qutebrowser ---"
          echo "SCRIPT_DIR: $SCRIPT_DIR"
          echo "BUNDLE_ROOT: $BUNDLE_ROOT"
          echo "PYTHONHOME: $PYTHONHOME"
          echo "QT_PLUGIN_PATH: $QT_PLUGIN_PATH"
          echo "LD_SO: $LD_SO"
          echo "Using Library Path: $LD_LIBRARY_PATH_ARG"
          echo "Running Python: $SCRIPT_DIR/python3"
          echo "Arguments: -m qutebrowser $@"
          echo "-----------------------------"

          # Execute Python using the bundled dynamic linker
          exec "$LD_SO" --library-path "$LD_LIBRARY_PATH_ARG" "$SCRIPT_DIR/python3" -m qutebrowser "$@"

          # Fallback/Error message if exec fails
          echo "Error: Failed to execute qutebrowser using $LD_SO" >&2
          exit 1
          EOF
          chmod +x "$BUNDLE_DIR/usr/bin/qutebrowser.sh"

          # Create a simple symlink for convenience
          ln -s qutebrowser.sh "$BUNDLE_DIR/usr/bin/qutebrowser"

      - name: Final bundle check
        run: |
          echo "--- Bundle Contents ---"
          ls -lR "$BUNDLE_DIR"
          echo "--- Bundle Sizes ---"
          du -sh "$BUNDLE_DIR"/*
          echo "--- Linker Info for python3 ---"
          readelf -d "$BUNDLE_DIR/usr/bin/python3" | grep 'interpreter\|RUNPATH' || true
          echo "--- Linker Info for a PyQt5 lib (example) ---"
          PYQT_CORE_SO=$(find "$BUNDLE_DIR/usr/lib/python3.10/site-packages/PyQt5" -name QtCore.so -print -quit)
          if [ -n "$PYQT_CORE_SO" ]; then readelf -d "$PYQT_CORE_SO" | grep 'RUNPATH' || true; fi
          echo "---------------------"

      - name: Create .tar.gz archive
        run: |
          tar -czvf $GITHUB_WORKSPACE/qutebrowser-portable.tar.gz -C $HOME qutebrowser-bundle

      - name: Generate SHA256 checksum
        run: |
          sha256sum $GITHUB_WORKSPACE/qutebrowser-portable.tar.gz > $GITHUB_WORKSPACE/qutebrowser-portable.tar.gz.sha256
          cat $GITHUB_WORKSPACE/qutebrowser-portable.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: |
            ${{ github.workspace }}/qutebrowser-portable.tar.gz
            ${{ github.workspace }}/qutebrowser-portable.tar.gz.sha256
          if-no-files-found: error
