name: Build Portable Qutebrowser VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-system-x86 qemu-utils libpulse-dev x11-xserver-utils alsa-utils

    - name: Create Minimal Ubuntu Chroot
      run: |
        sudo debootstrap --arch=amd64 jammy chroot http://archive.ubuntu.com/ubuntu/

        sudo chroot chroot bash -c '
        set -e
        export DEBIAN_FRONTEND=noninteractive

        echo "--- CHROOT: Updating apt lists (1st time) ---"
        apt-get update
        apt-get install -y --no-install-recommends software-properties-common
        add-apt-repository universe -y
        apt-get update

        echo "--- CHROOT: Installing main packages ---"
        apt-get install -y --no-install-recommends \
            qutebrowser \
            linux-generic \
            initramfs-tools \
            xserver-xorg-core \
            xinit \
            xterm \
            mesa-utils \
            libxcb1 libxcb-glx0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-render0 libxcb-shape0 \
            libxcb-shm0 libxcb-sync1 libxcb-util1 libxcb-xfixes0 \
            libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            xauth fonts-dejavu-core \
            xserver-xorg-input-libinput \
            x11-utils
        echo "--- CHROOT: Main package installation complete ---"

        echo "--- CHROOT: Adding modules to initramfs ---"
        echo "virtio_pci" >> /etc/initramfs-tools/modules
        echo "virtio_gpu" >> /etc/initramfs-tools/modules
        echo "9p" >> /etc/initramfs-tools/modules
        echo "9pnet_virtio" >> /etc/initramfs-tools/modules

        echo "--- CHROOT: Generating initramfs ---"
        update-initramfs -u -k all
        echo "--- CHROOT: Initramfs generation complete ---"

        echo "--- CHROOT: Verifying /boot contents ---"
        ls -l /boot || echo "/boot not found or ls failed"

        # --- FIXED: Remove minimal xorg.conf ---
        echo "--- CHROOT: Removing custom xorg.conf ---"
        rm -f /etc/X11/xorg.conf
        # --- End Fix ---

        echo "--- CHROOT: Cleaning apt cache ---"
        apt-get clean
        ' # End of chroot bash -c block

        sudo chroot chroot bash -c "echo 'qutebrowser-vm' > /etc/hostname"
        sudo chroot chroot bash -c "echo 'root:root' | chpasswd"

        # Startup script - Generate Xauthority cookie, run xdpyinfo
        sudo bash -c "cat > chroot/sbin/qute_init" << 'EOF'
        #!/bin/bash
        echo "--- Running Init Script ---"
        mkdir -p /mnt/host
        echo "Mounting hostshare..."
        mount -t 9p -o trans=virtio,version=9p2000.L hostshare /mnt/host || echo "Mount failed! Error code: $?"

        export DISPLAY=:0
        export XAUTHORITY=/root/.Xauthority
        # --- FIXED: Generate proper Xauth cookie ---
        if ! command -v xauth > /dev/null; then echo "xauth command not found!"; fi
        COOKIE=$(mcookie)
        echo "Generated cookie: $COOKIE"
        # Add cookie using host:display format which xauth prefers
        xauth add "$(hostname)/unix$DISPLAY" . "$COOKIE" || echo "xauth add failed!"
        xauth list
        # --- End Fix ---

        # Check /tmp permissions
        ls -ld /tmp /tmp/.X11-unix || echo "Could not list /tmp perms"

        echo "Starting Xorg..."
        /usr/bin/Xorg $DISPLAY > /var/log/Xorg.0.log 2>&1 &
        XORG_PID=$!
        echo "Waiting for X socket /tmp/.X11-unix/X0..."
        X_SOCKET_WAIT_COUNT=0
        X_DIED=0
        while [ ! -e /tmp/.X11-unix/X0 ]; do
          sleep 0.5
          X_SOCKET_WAIT_COUNT=$((X_SOCKET_WAIT_COUNT + 1))
          if ! ps -p $XORG_PID > /dev/null; then echo "Xorg process died!"; X_DIED=1; break; fi
          if [ $X_SOCKET_WAIT_COUNT -gt 20 ]; then echo "X socket wait timeout!"; X_DIED=1; break; fi
        done

        if [ -e /tmp/.X11-unix/X0 ]; then
            echo "X socket found."
            echo "Attempting to run xdpyinfo..."
            if xdpyinfo; then
              echo "xdpyinfo SUCCEEDED."
              # If xdpyinfo works, try qutebrowser
              echo "Launching Qutebrowser..."
              /usr/bin/qutebrowser || echo "Qutebrowser launch failed!"
            else
              echo "xdpyinfo FAILED! Check Xorg log."
              X_DIED=1 # Treat as failure
            fi
        else
            echo "X socket NOT found."
            X_DIED=1
        fi

        if [ $X_DIED -eq 1 ]; then
            echo "----- BEGIN /var/log/Xorg.0.log -----"
            cat /var/log/Xorg.0.log || echo "Failed to cat Xorg log"
            echo "----- END /var/log/Xorg.0.log -----"
        fi

        echo "Application exited or failed. Starting fallback shell."
        exec /bin/bash
        EOF

        sudo chroot chroot chmod +x /sbin/qute_init
        sudo rm -f chroot/root/.bash_profile

    - name: Package VM Components
      run: |
        echo "Listing host view of chroot/boot before copy:"
        sudo ls -l chroot/boot || echo "Could not list chroot/boot from host"
        if ! sudo ls chroot/boot/vmlinuz-* > /dev/null 2>&1; then echo "ERROR: Kernel (vmlinuz-*) not found in chroot/boot"; exit 1; fi
        if ! sudo ls chroot/boot/initrd.img-* > /dev/null 2>&1; then echo "ERROR: Initrd (initrd.img-*) not found in chroot/boot"; exit 1; fi
        sudo cp chroot/boot/vmlinuz-* kernel
        sudo cp chroot/boot/initrd.img-* initrd
        echo "Chroot size:"
        sudo du -sh chroot
        sudo dd if=/dev/zero of=filesystem.img bs=1M count=4096
        sudo mkfs.ext4 -F filesystem.img
        sudo mkdir -p /mnt/chroot
        sudo mount -o loop filesystem.img /mnt/chroot
        echo "Copying chroot contents to filesystem image..."
        sudo cp -a chroot/* /mnt/chroot/
        echo "Syncing..."
        sync
        sudo umount /mnt/chroot
        echo "VM components (kernel, initrd, filesystem.img) created."
        ls -lh kernel initrd filesystem.img

    - name: Create Simple Run Script
      run: |
        cat > run-qutebrowser-vm.sh << 'EOF'
        #!/bin/bash
        set -e
        QEMU_BIN="qemu-system-x86_64"
        command -v "$QEMU_BIN" >/dev/null 2>&1 || { echo "Error: $QEMU_BIN not found."; exit 1; }
        SCRIPT_DIR="$(dirname "$(readlink -f "$0")")"; KERNEL="$SCRIPT_DIR/kernel"; INITRD="$SCRIPT_DIR/initrd"; FS="$SCRIPT_DIR/filesystem.img"
        [ -f "$KERNEL" ] && [ -f "$INITRD" ] && [ -f "$FS" ] || { echo "Error: Missing VM components in $SCRIPT_DIR."; exit 1; }
        HOST_SHARE="$HOME"; GUEST_MOUNT="/mnt/host"
        echo "Sharing $HOST_SHARE at $GUEST_MOUNT"; echo "Use: file://$GUEST_MOUNT/..."
        echo "Connecting to SPICE display on port 5900..."; echo "Run: 'spicy -h 127.0.0.1 -p 5900'"
        echo "VM console output will appear below:"
        QEMU_ARGS=( -kernel "$KERNEL" -initrd "$INITRD" -drive "file=$FS,format=raw,if=virtio" -append "root=/dev/vda console=ttyS0 rw init=/sbin/qute_init" -m 1G -cpu host -enable-kvm -virtfs "local,path=$HOST_SHARE,mount_tag=hostshare,security_model=passthrough,id=hostshare" -vga virtio -spice "port=5900,addr=127.0.0.1,disable-ticketing=on" -serial stdio -device ac97 -device usb-ehci,id=ehci -device usb-tablet,bus=ehci.0 -device usb-kbd,bus=ehci.0 )
        echo "Starting Qutebrowser VM..."; "$QEMU_BIN" "${QEMU_ARGS[@]}"; echo "QEMU exited."
        EOF
        chmod +x run-qutebrowser-vm.sh

    - name: Bundle Package
      run: |
        echo "Packaging kernel, initrd, filesystem, and run script..."
        sudo tar -czf qutebrowser-vm.tar.gz kernel initrd filesystem.img run-qutebrowser-vm.sh
        rm -f kernel initrd filesystem.img run-qutebrowser-vm.sh
        echo "--- Final Package Contents ---"; tar -tvf qutebrowser-vm.tar.gz; echo "------------------------"
        ls -lh qutebrowser-vm.tar.gz
        tar -ztvf qutebrowser-vm.tar.gz | awk '{sum+=$3} END {printf "Estimated Uncompressed Size: %.2f MB\n", sum/1024/1024}'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-vm
        path: qutebrowser-vm.tar.gz
