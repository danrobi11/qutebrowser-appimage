name: Build Static Qutebrowser with QEMU (Qt6)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Increase File Descriptor Limit
      run: sudo sysctl -w fs.file-max=100000 && ulimit -n 4096 # Needed for QtWebEngine build

    - name: Install build dependencies
      run: |
        sudo apt-get update
        # Add -x temporarily for debugging if needed: # set -x
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          cmake \
          git \
          wget \
          xz-utils \
          ca-certificates \
          # Python
          python3-dev \
          python3-pip \
          python3-venv \
          # QEMU
          qemu-user-static \
          # Qt / General Build
          ninja-build \
          gperf \
          pkg-config \
          patchelf \
          # X11 / Graphics Headers (Needed by Qt/QtWebEngine build)
          libx11-dev \
          libxkbcommon-x11-dev \
          libxkbcommon-dev \
          libxcb1-dev \
          libxcb-util-dev \
          libxcb-keysyms1-dev \
          libxcb-icccm4-dev \
          libxcb-randr0-dev \
          libxcb-xkb-dev \
          libxcb-xinerama0-dev \
          libxcb-shape0-dev \
          libxcb-sync-dev \
          libxcb-render-util0-dev \
          libxcb-image0-dev \
          libdrm-dev \
          libxcomposite-dev \
          libxtst-dev \
          libxdamage-dev \
          libxrandr-dev \
          libx11-xcb-dev \
          libgl1-mesa-dev \
          libegl1-mesa-dev \
          libegl-dev \
          libglvnd-dev \
          # Qt Dependencies (to build statically)
          libicu-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libssl-dev \
          libzstd-dev \
          libpng-dev \
          libjpeg-dev \
          libwebp-dev \
          libharfbuzz-dev \
          zlib1g-dev \
          # FFmpeg Dependencies
          nasm \
          yasm \
          libx264-dev \
          libvpx-dev \
          # Audio Dependencies (for QtWebEngine/FFmpeg)
          libasound2-dev \
          libpulse-dev \
          # Network Dependencies
          libnss3-dev \
          # PyQt Build
          python3-pyqt6.sip \
        # Cleanup (optional, remove after debugging if needed)
        # set +x

    - name: Set Environment Variables
      run: |
        echo "QTDIR=/opt/qt6-static" >> $GITHUB_ENV
        echo "PATH=/opt/qt6-static/bin:$PATH" >> $GITHUB_ENV
        echo "PKG_CONFIG_PATH=/opt/ffmpeg-static/lib/pkgconfig:/opt/qt6-static/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=/opt/ffmpeg-static/lib:/opt/qt6-static/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV # May help tools find libs
        echo "QT_PLUGIN_PATH=/opt/qt6-static/plugins" >> $GITHUB_ENV
        echo "QUTEBROWSER_VERSION=v3.2.0" >> $GITHUB_ENV # Use a recent version compatible with Qt6
        echo "QT_VERSION=6.6.3" >> $GITHUB_ENV # Use a recent Qt6 version
        echo "FFMPEG_VERSION=n6.1.1" >> $GITHUB_ENV # Use a recent FFmpeg version

    - name: Upgrade pip
      run: |
        python3 -m pip install --no-cache-dir --upgrade pip>=23.0 wheel

    # --- Build FFmpeg First ---
    - name: Build static FFmpeg (with x264, vpx)
      run: |
        git clone --depth 1 --branch ${{ env.FFMPEG_VERSION }} https://git.ffmpeg.org/ffmpeg.git
        cd ffmpeg
        ./configure \
          --prefix=/opt/ffmpeg-static \
          --pkg-config-flags="--static" \
          --extra-libs="-lpthread -lm -lz" \
          --enable-static \
          --disable-shared \
          --disable-programs \
          --disable-doc \
          --disable-avdevice \
          --disable-postproc \
          --enable-gpl \
          --enable-libx264 \
          --enable-libvpx \
          # Add other needed decoders/demuxers/protocols for web compatibility
          --enable-decoder=aac \
          --enable-decoder=h264 \
          --enable-decoder=vp8 \
          --enable-decoder=vp9 \
          --enable-decoder=theora \
          --enable-decoder=opus \
          --enable-decoder=vorbis \
          --enable-demuxer=aac \
          --enable-demuxer=flv \
          --enable-demuxer=hls \
          --enable-demuxer=matroska \
          --enable-demuxer=mov \
          --enable-demuxer=mp3 \
          --enable-demuxer=ogg \
          --enable-demuxer=wav \
          --enable-protocol=file \
          --enable-protocol=http \
          --enable-protocol=https \
          --enable-protocol=tcp \
          --enable-protocol=tls \
          --enable-protocol=udp
        make -j$(nproc)
        sudo make install
        cd ..
        # rm -rf ffmpeg # Keep source for potential debugging if needed later

    # --- Build Static Qt6 Core ---
    - name: Download and build static Qt6 core
      run: |
        wget https://download.qt.io/archive/qt/${{ env.QT_VERSION }}/${{ env.QT_VERSION }}/single/qt-everywhere-src-${{ env.QT_VERSION }}.tar.xz
        tar xf qt-everywhere-src-${{ env.QT_VERSION }}.tar.xz
        cd qt-everywhere-src-${{ env.QT_VERSION }}
        # Apply patches if necessary (e.g., for static build issues)
        ./configure -static -prefix /opt/qt6-static -opensource -confirm-license \
          -release -optimize-size \
          -no-pch \
          -platform linux-g++ \
          # Essential features for WebEngine
          -fontconfig \
          -icu \
          # Include necessary multimedia/graphics backends if possible
          # -qt-libpng -qt-libjpeg -qt-freetype -qt-harfbuzz are default/enabled when found
          -no-feature-dbus \
          -no-feature-glib \
          -no-cups \
          -skip qt3d \
          -skip qtactiveqt \
          -skip qtcharts \
          -skip qtcoap \
          -skip qtconnectivity \
          -skip qtdatavis3d \
          -skip qtdeclarative \ # Re-add if Qutebrowser build fails needing QtQuick/QML
          -skip qtdoc \
          -skip qtgraphs \
          -skip qthttpserver \
          -skip qtlocation \
          -skip qtlottie \
          -skip qtmqtt \
          -skip qtmultimedia \ # WebEngine provides its own multimedia via FFmpeg
          -skip qtnetworkauth \
          -skip qtopcua \
          -skip qtpositioning \
          -skip qtquick3d \
          -skip qtquicktimeline \
          -skip qtremoteobjects \
          -skip qtscxml \
          -skip qtsensors \
          -skip qtserialbus \
          -skip qtserialport \
          -skip qtspeech \
          -skip qtsvg \
          -skip qttools \
          -skip qttranslations \
          -skip qtvirtualkeyboard \
          -skip qtwayland \
          -skip qtwebchannel \
          -skip qtwebglplugin \
          -skip qtwebsockets \
          -skip qtwebview
          # Purposefully NOT skipping: qtbase, qtwebengine
        cmake --build . --parallel $(nproc) --target corelib gui widgets network # Build only essential modules first
        sudo cmake --install . --prefix /opt/qt6-static

    # --- Build Static QtWebEngine ---
    - name: Build static QtWebEngine (using custom FFmpeg)
      env:
        # Ensure compiler/linker flags point to static libs if needed
        LDFLAGS: "-L/opt/ffmpeg-static/lib -L/opt/qt6-static/lib"
        CPPFLAGS: "-I/opt/ffmpeg-static/include -I/opt/qt6-static/include"
      run: |
        cd qt-everywhere-src-${{ env.QT_VERSION }}/qtwebengine
        # Configure QtWebEngine module using the installed static Qt
        /opt/qt6-static/bin/qt-configure-module . \
          -webengine-ffmpeg=system \
          -feature-webengine-proprietary-codecs \
          -no-feature-webengine-pulse-audio # Try building without pulseaudio first for smaller size/fewer deps
          # -webengine-alsa # Enable if needed
        # Build and install QtWebEngine
        cmake --build . --parallel $(nproc)
        sudo cmake --install . --prefix /opt/qt6-static
        cd ../..
        # rm -rf qt-everywhere-src-${{ env.QT_VERSION }} # Keep source for potential debugging

    # --- Build PyQt6 against Static Qt ---
    - name: Build PyQt6 and PyQt6-WebEngine from source
      env:
        QT_SELECT: qt6 # Help tools find the correct Qt version
      run: |
        # Ensure qmake from our static build is used
        export PATH="/opt/qt6-static/bin:$PATH"
        echo "Using qmake: $(which qmake)"
        qmake -v

        # Build PyQt6 - this will take time
        # Pin versions carefully - check Qutebrowser compatibility. Use versions compatible with Qt ${QT_VERSION}
        # Let's try installing without strict pinning first to see if pip can resolve compatible versions
        # If this fails, try pinning e.g.: PyQt6==6.6.0 PyQt6-sip==13.6.0 PyQt6-WebEngine==6.6.0
        echo "Attempting to build PyQt6 and PyQt6-WebEngine from source..."
        python3 -m pip install --no-cache-dir --verbose --no-binary :all: PyQt6 PyQt6-sip PyQt6-WebEngine

        # Verify installation (optional but recommended)
        echo "Verifying PyQt6 installation..."
        python3 -c "from PyQt6 import QtCore; from PyQt6.QtCore import QT_VERSION_STR; print(f'PyQt6 QtCore OK, Qt Version: {QT_VERSION_STR}')"
        python3 -c "from PyQt6 import QtWebEngineCore; print('PyQt6 QtWebEngineCore OK')"
        python3 -c "from PyQt6 import QtWebEngineWidgets; print('PyQt6 QtWebEngineWidgets OK')"


    # --- Prepare and Package Qutebrowser ---
    - name: Install PyInstaller and Clone Qutebrowser
      run: |
        python3 -m pip install --no-cache-dir pyinstaller==6.6.0 # Use a recent stable version
        git clone --depth 1 --branch ${{ env.QUTEBROWSER_VERSION }} https://github.com/qutebrowser/qutebrowser.git
        cd qutebrowser
        # Install Qutebrowser runtime dependencies (excluding PyQt which we built)
        echo "Installing qutebrowser dependencies..."
        # Create a temporary requirements file without PyQt lines
        grep -vE '^PyQt6|^PyQt6-WebEngine|^PyQt6-sip' requirements/requirements.txt > requirements-no-pyqt.txt
        python3 -m pip install --no-cache-dir -r requirements-no-pyqt.txt --ignore-installed # Ignore system packages
        rm requirements-no-pyqt.txt

    - name: Package Qutebrowser with PyInstaller
      run: |
        cd qutebrowser
        echo "Running PyInstaller..."
        # PyInstaller might need help finding resources and static plugins
        # The paths added via --add-data must exist in the build container at this point
        # Destination paths (after ':') are relative to the PyInstaller bundle root
        pyinstaller --noconfirm --log-level=INFO \
          --name qutebrowser \
          --onefile \
          --add-data "qutebrowser/html:qutebrowser/html" \
          --add-data "qutebrowser/js:qutebrowser/js" \
          --add-data "qutebrowser/misc:qutebrowser/misc" \
          --add-data "qutebrowser/schemes:qutebrowser/schemes" \
          --add-data "qutebrowser/icons:qutebrowser/icons" \
          --add-data "qutebrowser/messages:qutebrowser/messages" \
          --add-data "/opt/qt6-static/plugins/platforms:qt6/plugins/platforms" \
          --add-data "/opt/qt6-static/plugins/imageformats:qt6/plugins/imageformats" \
          --add-data "/opt/qt6-static/plugins/tls:qt6/plugins/tls" \
          --add-data "/opt/qt6-static/plugins/xcbglintegrations:qt6/plugins/xcbglintegrations" \
          --add-data "/opt/qt6-static/libexec:qt6/libexec" \ # QtWebEngineProcess
          --hidden-import="pkg_resources.py2_warn" \
          --hidden-import="pkg_resources.markers" \
          --hidden-import="qutebrowser.app" \
          --hidden-import="qutebrowser.browser.webengine" \
          --hidden-import="qutebrowser.utils.debug" \
          --hidden-import="PyQt6.sip" \
          --hidden-import="PyQt6.QtWebEngineWidgets" \
          --hidden-import="PyQt6.QtQuick" \
          --hidden-import="PyQt6.QtOpenGLWidgets" # Often needed with WebEngine
          qutebrowser/__main__.py
        echo "PyInstaller finished."
        ls -l dist/ # Check output
        cd ..

    - name: Create run script
      run: |
        cat > run-qutebrowser.sh << 'EOF'
        #!/bin/bash
        set -e # Exit on error

        SCRIPT_DIR="$(dirname "$(readlink -f "$0")")"
        QUTEBROWSER_APP="$SCRIPT_DIR/qutebrowser" # PyInstaller executable
        QEMU_BIN="$SCRIPT_DIR/qemu-x86_64-static"

        # Check for QEMU and App
        if [ ! -f "$QEMU_BIN" ]; then
          echo "Error: QEMU binary '$QEMU_BIN' not found."
          exit 1
        fi
        if [ ! -f "$QUTEBROWSER_APP" ]; then
          echo "Error: Qutebrowser application '$QUTEBROWSER_APP' not found."
          exit 1
        fi
        chmod +x "$QEMU_BIN" "$QUTEBROWSER_APP" 2>/dev/null

        # Prepare Environment for QEMU User Mode
        QEMU_ARGS=()

        # X11 Forwarding
        if [ -n "$DISPLAY" ]; then
          echo "Setting up X11 forwarding for DISPLAY=$DISPLAY"
          QEMU_ARGS+=("-E" "DISPLAY=$DISPLAY")
          # Ensure X11 socket directory exists and add volume mount for QEMU
          X11_SOCKET_DIR=$(dirname "${DISPLAY}")
          if [[ "$DISPLAY" == /* ]]; then # Absolute path socket (e.g. /tmp/.X11-unix/X0)
             X11_SOCKET_PATH="$DISPLAY"
             X11_SOCKET_DIR=$(dirname "$X11_SOCKET_PATH")
             DISPLAY_NUM=$(basename "$X11_SOCKET_PATH")
             # QEMU needs the DISPLAY env var set to the host:port format, not the socket path
             # Attempt to get host:port from `xauth list $DISPLAY` or make a guess
             DISPLAY_HOST_PORT=$(echo "$DISPLAY" | sed -n 's/^\([^:]*\):\([0-9]\+\).*/\1:\2/p')
             if [ -z "$DISPLAY_HOST_PORT" ]; then
                 # Fallback guess if socket path was given
                 DISPLAY_HOST_PORT="unix:$(echo "$DISPLAY" | sed -n 's/.*X\([0-9]\+\)/\1/p')"
                 echo "Warning: DISPLAY uses socket path. Guessing DISPLAY as $DISPLAY_HOST_PORT for QEMU."
             fi
             QEMU_ARGS+=("-E" "DISPLAY=$DISPLAY_HOST_PORT")

          elif [[ "$DISPLAY" == unix:* ]]; then # unix: socket format
            X11_SOCKET_DIR="/tmp/.X11-unix" # Standard location
            DISPLAY_HOST_PORT="$DISPLAY"
            QEMU_ARGS+=("-E" "DISPLAY=$DISPLAY_HOST_PORT")

          else # Standard :0, hostname:0 format
            DISPLAY_HOST_PORT="$DISPLAY"
            X11_SOCKET_DIR="/tmp/.X11-unix" # Standard location
            QEMU_ARGS+=("-E" "DISPLAY=$DISPLAY_HOST_PORT")
          fi

          # Mount the socket directory if it exists
          if [ -d "$X11_SOCKET_DIR" ]; then
             QEMU_ARGS+=("-v" "$X11_SOCKET_DIR:$X11_SOCKET_DIR")
          else
             echo "Warning: X11 socket directory '$X11_SOCKET_DIR' not found."
          fi

          # Handle Xauthority
          # Determine effective XAUTHORITY path
          XAUTH_FILE="${XAUTHORITY:-$HOME/.Xauthority}"
          if [ -f "$XAUTH_FILE" ]; then
            echo "Using Xauthority file: $XAUTH_FILE"
            QEMU_ARGS+=("-E" "XAUTHORITY=/tmp/guest.Xauthority") # Use a fixed path inside QEMU
            QEMU_ARGS+=("-v" "$XAUTH_FILE:/tmp/guest.Xauthority:ro") # Map it read-only
          else
            echo "Warning: XAUTHORITY file '$XAUTH_FILE' not found. X11 authentication may fail."
          fi
        else
          echo "Error: DISPLAY environment variable is not set. Cannot run graphical application."
          exit 1
        fi

        # Home Directory Access (QEMU inherits filesystem access, just pass env var)
        QEMU_ARGS+=("-E" "HOME=$HOME")
        # Also pass USER and LOGNAME for completeness
        QEMU_ARGS+=("-E" "USER=$USER")
        QEMU_ARGS+=("-E" "LOGNAME=$LOGNAME")

        # Pass Qt specific environment variables that might be needed inside QEMU
        # These paths are relative to the root *inside* the QEMU environment.
        # PyInstaller unpacks to /tmp/_MEIxxxxxx, but env vars set here might influence Qt's search paths BEFORE PyInstaller overrides them.
        # Let's use the paths defined in --add-data destination.
        QEMU_ARGS+=("-E" "QT_PLUGIN_PATH=/qt6/plugins")
        QEMU_ARGS+=("-E" "QT_QPA_PLATFORM=xcb") # Explicitly set platform plugin
        QEMU_ARGS+=("-E" "QTWEBENGINEPROCESS_PATH=/qt6/libexec/QtWebEngineProcess")

        # Fontconfig Cache (Important for static fontconfig)
        # Make cache user-specific and writable within the user's home
        # Inside QEMU, $HOME will be mapped to the host $HOME
        QEMU_ARGS+=("-E" "XDG_CACHE_HOME=$HOME/.cache")
        QEMU_ARGS+=("-E" "FONTCONFIG_PATH=/etc/fonts") # Standard host path might be needed by static fontconfig

        # Sound (Pulseaudio/Pipewire via socket)
        if [ -n "$XDG_RUNTIME_DIR" ]; then
          PULSE_SOCKET="$XDG_RUNTIME_DIR/pulse/native"
          PIPEWIRE_SOCKET="$XDG_RUNTIME_DIR/pipewire-0"
          if [ -S "$PULSE_SOCKET" ]; then
              echo "Setting up PulseAudio forwarding via $PULSE_SOCKET"
              QEMU_ARGS+=("-E" "PULSE_SERVER=unix:$PULSE_SOCKET")
              QEMU_ARGS+=("-v" "$PULSE_SOCKET:$PULSE_SOCKET")
          elif [ -S "$PIPEWIRE_SOCKET" ]; then
              echo "Setting up PipeWire forwarding via $PIPEWIRE_SOCKET (experimental)"
              # PipeWire might need more env vars or specific setup
              QEMU_ARGS+=("-v" "$XDG_RUNTIME_DIR:$XDG_RUNTIME_DIR") # Broad access might be needed
          fi
        else
          echo "Warning: XDG_RUNTIME_DIR not set, cannot forward PulseAudio/PipeWire sockets."
        fi
        # Fallback ALSA access (requires device access)
        # if [ -d /dev/snd ]; then
        #   echo "Mapping ALSA devices /dev/snd"
        #   QEMU_ARGS+=("-v" "/dev/snd:/dev/snd")
        # fi

        # Locale settings from host
        QEMU_ARGS+=("-E" "LANG=${LANG:-C.UTF-8}")
        QEMU_ARGS+=("-E" "LC_ALL=${LC_ALL}")
        QEMU_ARGS+=("-E" "LANGUAGE=${LANGUAGE}")

        echo "Starting Qutebrowser via QEMU..."
        # The QEMU command requires the host path to the target binary
        # Pass remaining arguments "$@" to qutebrowser
        "$QEMU_BIN" "${QEMU_ARGS[@]}" "$QUTEBROWSER_APP" "$@"

        EOF
        chmod +x run-qutebrowser.sh

    - name: Bundle package
      run: |
        # Copy the static QEMU binary
        cp /usr/bin/qemu-x86_64-static .

        # Create the package directory
        mkdir qutebrowser-qemu-pkg
        mv qutebrowser/dist/qutebrowser qutebrowser-qemu-pkg/ # Move PyInstaller executable
        mv qemu-x86_64-static qutebrowser-qemu-pkg/
        mv run-qutebrowser.sh qutebrowser-qemu-pkg/

        # Archive the package directory
        tar -czf qutebrowser-qemu.tar.gz qutebrowser-qemu-pkg
        echo "--- Package Contents ---"
        tar -tvf qutebrowser-qemu.tar.gz
        echo "------------------------"
        ls -lh qutebrowser-qemu.tar.gz
        # Estimate uncompressed size (approximate)
        tar -ztvf qutebrowser-qemu.tar.gz | awk '{sum+=$3} END {printf "Estimated Uncompressed Size: %.2f MB\n", sum/1024/1024}'


    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-qemu
        path: qutebrowser-qemu.tar.gz
