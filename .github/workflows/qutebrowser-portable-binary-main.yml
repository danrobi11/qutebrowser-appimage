name: qutebrowser-podman-x11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Podman and runc
        run: |
          sudo apt update
          sudo apt install -y podman runc

      - name: Create Containerfile
        run: |
          cat > Containerfile <<'EOF'
          FROM ubuntu:22.04

          # Set up environment
          ENV DEBIAN_FRONTEND=noninteractive
          ENV XDG_RUNTIME_DIR=/run/user/1000
          ENV PULSE_SERVER=unix:/run/user/1000/pulse/native

          # Install base dependencies with Qt 6, xcb-cursor0, and full multimedia support
          RUN apt update && apt install -y \
              python3.10 \
              python3-pip \
              python3-setuptools \
              libffi8 \
              # Qt 6 and WebEngine core
              libqt6webenginecore6 \
              libqt6webenginewidgets6 \
              libqt6widgets6 \
              libqt6gui6 \
              libqt6core6 \
              libqt6opengl6 \
              libqt6network6 \
              libqt6dbus6 \
              libqt6printsupport6 \
              libqt6qml6 \
              libqt6qmlmodels6 \
              libqt6quick6 \
              libqt6quickwidgets6 \
              libqt6webchannel6 \
              # Graphics and X11 dependencies
              libgl1 \
              libegl1 \
              libxkbcommon0 \
              libfontconfig1 \
              libx11-6 \
              libx11-xcb1 \
              libxcb1 \
              libxcb-glx0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-shm0 \
              libxcb-sync1 \
              libxcb-xfixes0 \
              libxcb-xinerama0 \
              libxcb-xkb1 \
              libxcb-cursor0 \
              libxext6 \
              libxfixes3 \
              libxrender1 \
              libgl1-mesa-dri \
              libglx-mesa0 \
              libxkbcommon-x11-0 \
              # Audio/Video for WebEngine
              libasound2 \
              libpulse0 \
              pulseaudio \
              ffmpeg \
              libavcodec58 \
              libavformat58 \
              libavutil56 \
              libswscale5 \
              libavfilter7 \
              libavdevice58 \
              gstreamer1.0-plugins-base \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              gstreamer1.0-plugins-ugly \
              gstreamer1.0-libav \
              gstreamer1.0-pulseaudio \
              # Fonts and misc
              fontconfig \
              fontconfig-config \
              libfreetype6 \
              libpng16-16 \
              libjpeg8 \
              libdouble-conversion3 \
              libicu70 \
              libpcre2-8-0 \
              libzstd1 \
              zlib1g \
              # GLIBC and runtime
              libc6 \
              libgcc-s1 \
              libstdc++6 \
              && apt-get update && apt-get install -y libxcb-cursor0 \
              && dpkg -l | grep libxcb-cursor0 \
              && mkdir -p /run/user/1000/pulse \
              && chmod 700 /run/user/1000 \
              && chmod 700 /run/user/1000/pulse \
              && rm -rf /var/lib/apt/lists/*

          # Upgrade pip and install qutebrowser dependencies
          RUN python3 -m pip install --no-cache-dir --upgrade pip>=23.0 && \
              python3 -m pip install --no-cache-dir --root-user-action=ignore \
              qutebrowser \
              pyqt6 \
              pyqt6-webengine \
              jinja2 \
              markupsafe \
              pyyaml

          # Create group and user (UID/GID 1000)
          RUN groupadd -g 1000 user && \
              useradd -m -u 1000 -g 1000 user && \
              chown -R user:user /run/user/1000

          # Set runtime user
          USER user
          WORKDIR /home/user

          # Entrypoint
          CMD ["python3", "-m", "qutebrowser"]
          EOF

      - name: Build Podman Container with runc
        run: |
          sudo podman build --runtime /usr/bin/runc -t qutebrowser-x11:latest -f Containerfile .
          sudo podman images

      - name: Save Container Image
        run: |
          sudo podman save -o qutebrowser-x11.tar qutebrowser-x11:latest

      - name: Create Launch Script
        run: |
          cat > launch-qutebrowser.sh <<'EOF'
          #!/bin/bash
          set -e

          # Get the host username
          USERNAME=${USER:-$(whoami)}
          echo "Host username: $USERNAME"

          # Set working directory to script location
          SCRIPT_DIR="$(dirname "$(realpath "$0")")"
          cd "$SCRIPT_DIR" || { echo "Failed to cd to $SCRIPT_DIR"; exit 1; }
          echo "Working directory set to: $(/bin/pwd)"

          # Use a user-writable runtime directory
          RUNTIME_DIR="$HOME/.run"
          if [ ! -d "$RUNTIME_DIR" ]; then
            mkdir -p "$RUNTIME_DIR"
            chmod 700 "$RUNTIME_DIR"
            echo "Created runtime dir: $RUNTIME_DIR"
          fi
          export XDG_RUNTIME_DIR="$RUNTIME_DIR"
          echo "XDG_RUNTIME_DIR set to: $XDG_RUNTIME_DIR"

          # Ensure DISPLAY is set and X11 is accessible
          echo "DISPLAY: $DISPLAY"
          if [ -z "$DISPLAY" ]; then
            echo "DISPLAY unset—trying :0"
            export DISPLAY=:0
          fi
          if ! xset q >/dev/null 2>&1; then
            echo "Cannot connect to X server $DISPLAY—run from an X session"
            exit 1
          fi

          # Grant local X11 access
          echo "Granting local X11 access..."
          xhost +SI:localuser:$USER
          xhost

          # Load and run the container with full userspace access
          echo "Loading container image..."
          podman load -i "$SCRIPT_DIR/qutebrowser-x11.tar"
          echo "Launching qutebrowser..."

          # Debug: Check if home directory contents are visible and readable
          echo "Checking home directory in container..."
          podman run --rm -it \
            -v "$HOME:/home/$USERNAME:rw,z" \
            -e HOME="/home/$USERNAME" \
            -e XDG_RUNTIME_DIR=/run/user/1000 \
            --userns=keep-id \
            localhost/qutebrowser-x11:latest \
            bash -c "whoami && ls -l /home/$USERNAME && cat /home/$USERNAME/build-error-report.txt | head -n 1 || echo 'Cannot read files in home directory'"

          # Run qutebrowser with full userspace access and audio
          podman run --rm -it \
            -e DISPLAY=$DISPLAY \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            -v "$HOME:/home/$USERNAME:rw,z" \
            -e HOME="/home/$USERNAME" \
            -e XDG_RUNTIME_DIR=/run/user/1000 \
            -e XDG_CONFIG_HOME="/home/$USERNAME/.config" \
            -e XDG_DATA_HOME="/home/$USERNAME/.local/share" \
            -e XDG_CACHE_HOME="/home/$USERNAME/.cache" \
            -e PULSE_SERVER=unix:/run/user/1000/pulse/native \
            -v /run/user/$(id -u)/pulse:/run/user/1000/pulse:rw \
            -v /dev/snd:/dev/snd \
            --userns=keep-id \
            --security-opt label=disable \
            localhost/qutebrowser-x11:latest \
            python3 -m qutebrowser -s content.local_content_can_access_file_urls true
          EOF
          chmod +x launch-qutebrowser.sh

      - name: Generate SHA256 Checksum
        run: |
          sha256sum qutebrowser-x11.tar > qutebrowser-x11.tar.sha256
          cat qutebrowser-x11.tar.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-x11-podman
          path: |
            qutebrowser-x11.tar
            launch-qutebrowser.sh
            qutebrowser-x11.tar.sha256
          if-no-files-found: error
