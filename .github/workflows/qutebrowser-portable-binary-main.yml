name: Build qutebrowser Flatpak

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Flatpak environment
      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder
          flatpak --version
          flatpak-builder --version

      # Add Flathub remote and install required runtimes (user scope)
      - name: Set up Flatpak runtimes
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.kde.Platform//6.6 org.kde.Sdk//6.6

      # Build the Flatpak
      - name: Build qutebrowser Flatpak
        run: |
          flatpak-builder --user --force-clean --repo=repo build-dir org.qutebrowser.qutebrowser.yml

      # Export Flatpak bundle
      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo qutebrowser.flatpak org.qutebrowser.qutebrowser

      # Upload the Flatpak artifact
      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-3.2.0-flatpak
          path: qutebrowser.flatpak
          retention-days: 7
