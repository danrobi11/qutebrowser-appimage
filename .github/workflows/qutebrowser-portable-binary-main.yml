name: Build Portable Qutebrowser VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-system-x86 qemu-utils libpulse-dev x11-xserver-utils alsa-utils

    - name: Create Minimal Ubuntu Chroot
      run: |
        sudo debootstrap --arch=amd64 jammy chroot http://archive.ubuntu.com/ubuntu/

        # Group apt operations with set -e and logging
        sudo chroot chroot bash -c '
        set -e
        export DEBIAN_FRONTEND=noninteractive

        echo "--- CHROOT: Updating apt lists (1st time) ---"
        apt-get update

        echo "--- CHROOT: Installing software-properties-common ---"
        apt-get install -y --no-install-recommends software-properties-common

        echo "--- CHROOT: Adding universe repository ---"
        add-apt-repository universe -y

        echo "--- CHROOT: Updating apt lists (2nd time, after adding repo) ---"
        apt-get update

        echo "--- CHROOT: Installing main packages ---"
        # --- FIXED: Added initramfs-tools ---
        apt-get install -y --no-install-recommends \
            qutebrowser \
            linux-image-generic \
            initramfs-tools \
            xserver-xorg-core \
            xinit \
            xterm
        echo "--- CHROOT: Main package installation complete ---"

        # --- FIXED: Explicitly generate initrd ---
        echo "--- CHROOT: Generating initramfs ---"
        update-initramfs -c -k all
        echo "--- CHROOT: Initramfs generation complete ---"

        echo "--- CHROOT: Verifying /boot contents ---"
        ls -l /boot || echo "/boot not found or ls failed"
        # --- End Fixes ---

        echo "--- CHROOT: Cleaning apt cache ---"
        apt-get clean
        ' # End of chroot bash -c block

        # Continue with non-apt chroot commands
        sudo chroot chroot bash -c "echo 'qutebrowser-vm' > /etc/hostname"
        sudo chroot chroot bash -c "echo 'root:root' | chpasswd"

        # Set up X and Qutebrowser script
        sudo bash -c "cat > chroot/root/start_qutebrowser.sh" << 'EOF'
        #!/bin/bash
        echo "--- Running start_qutebrowser.sh ---"
        mkdir -p /mnt/host
        echo "Mounting hostshare..."
        mount -t 9p -o trans=virtio,version=9p2000.L hostshare /mnt/host || echo "Mount failed!"
        export DISPLAY=:0
        echo "Starting Xorg..."
        /usr/bin/Xorg $DISPLAY &
        XORG_PID=$!
        echo "Waiting for X socket /tmp/.X11-unix/X0..."
        X_SOCKET_WAIT_COUNT=0
        while [ ! -e /tmp/.X11-unix/X0 ]; do
          sleep 0.5
          X_SOCKET_WAIT_COUNT=$((X_SOCKET_WAIT_COUNT + 1))
          if ! ps -p $XORG_PID > /dev/null; then echo "Xorg process died!"; break; fi
          if [ $X_SOCKET_WAIT_COUNT -gt 20 ]; then echo "X socket wait timeout!"; break; fi # Add timeout
        done
        if [ -e /tmp/.X11-unix/X0 ]; then echo "X socket found."; else echo "X socket NOT found."; fi
        echo "Launching Qutebrowser..."
        /usr/bin/qutebrowser
        echo "Qutebrowser exited. Starting fallback shell."
        exec /bin/bash
        EOF

        sudo chroot chroot chmod +x /root/start_qutebrowser.sh
        sudo rm -f chroot/root/.bash_profile

    - name: Package VM Components
      run: |
        # --- FIXED: Add check before copying ---
        echo "Listing host view of chroot/boot before copy:"
        sudo ls -l chroot/boot || echo "Could not list chroot/boot from host"
        if ! sudo ls chroot/boot/vmlinuz-* > /dev/null 2>&1; then echo "ERROR: Kernel (vmlinuz-*) not found in chroot/boot"; exit 1; fi
        if ! sudo ls chroot/boot/initrd.img-* > /dev/null 2>&1; then echo "ERROR: Initrd (initrd.img-*) not found in chroot/boot"; exit 1; fi

        sudo cp chroot/boot/vmlinuz-* kernel
        sudo cp chroot/boot/initrd.img-* initrd
        echo "Chroot size:"
        sudo du -sh chroot
        sudo dd if=/dev/zero of=filesystem.img bs=1M count=4096
        sudo mkfs.ext4 -F filesystem.img
        sudo mkdir -p /mnt/chroot
        sudo mount -o loop filesystem.img /mnt/chroot
        echo "Copying chroot contents to filesystem image..."
        sudo cp -a chroot/* /mnt/chroot/
        echo "Syncing..."
        sync
        sudo umount /mnt/chroot
        echo "Packaging kernel, initrd, filesystem..."
        sudo tar -czf qutebrowser-vm-temp.tar.gz kernel initrd filesystem.img
        ls -lh kernel initrd filesystem.img qutebrowser-vm-temp.tar.gz

    - name: Create Simple Run Script
      run: |
        cat > run-qutebrowser-vm.sh << 'EOF'
        #!/bin/bash
        set -e

        QEMU_BIN="qemu-system-x86_64"

        command -v "$QEMU_BIN" >/dev/null 2>&1 || {
          echo "Error: $QEMU_BIN not found."
          echo "Please install QEMU first (e.g., 'sudo xbps-install -S qemu' on Void)."
          exit 1
        }

        SCRIPT_DIR="$(dirname "$(readlink -f "$0")")"
        KERNEL="$SCRIPT_DIR/kernel"
        INITRD="$SCRIPT_DIR/initrd"
        FS="$SCRIPT_DIR/filesystem.img"

        [ -f "$KERNEL" ] && [ -f "$INITRD" ] && [ -f "$FS" ] || {
          echo "Error: Missing VM components (kernel, initrd, or filesystem.img) in $SCRIPT_DIR."
          exit 1
        }

        HOST_SHARE="$HOME"
        GUEST_MOUNT="/mnt/host"
        echo "Sharing your home directory ($HOST_SHARE) at $GUEST_MOUNT in Qutebrowser."
        echo "Open files with 'file://$GUEST_MOUNT/path/to/file' (e.g., 'file:///mnt/host/Documents/test.html')."
        echo "Connecting to SPICE display..."
        echo "Run: 'spicy' (or spicy connected to the auto-detected socket) to see Qutebrowser (install with 'sudo xbps-install -S spice-gtk')."
        echo "VM console output will appear below:"

        QEMU_ARGS=(
          -kernel "$KERNEL"
          -initrd "$INITRD"
          -drive "file=$FS,format=raw,if=virtio"
          -append "root=/dev/vda console=ttyS0 rw init=/root/start_qutebrowser.sh" # Run script directly
          -m 1G # Memory size
          -cpu host # Use host CPU features
          -enable-kvm # Use hardware acceleration
          -virtfs "local,path=$HOST_SHARE,mount_tag=hostshare,security_model=passthrough,id=hostshare"
          -vga virtio # Use virtio GPU
          -display spice-app # Use SPICE display integration
          -serial stdio # Route guest serial console to host terminal
          -soundhw hda # Add a basic sound device
        )

        echo "Starting Qutebrowser VM..."
        "$QEMU_BIN" "${QEMU_ARGS[@]}"
        echo "QEMU exited."
        EOF
        chmod +x run-qutebrowser-vm.sh

    - name: Bundle Package
      run: |
        # Add the run script to the temporary tar, create final tar
        sudo tar --append --file=qutebrowser-vm-temp.tar.gz run-qutebrowser-vm.sh
        mv qutebrowser-vm-temp.tar.gz qutebrowser-vm.tar.gz
        # Cleanup individual files
        rm -f kernel initrd filesystem.img run-qutebrowser-vm.sh

        echo "--- Final Package Contents ---"
        tar -tvf qutebrowser-vm.tar.gz
        echo "------------------------"
        ls -lh qutebrowser-vm.tar.gz
        tar -ztvf qutebrowser-vm.tar.gz | awk '{sum+=$3} END {printf "Estimated Uncompressed Size: %.2f MB\n", sum/1024/1024}'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-vm
        path: qutebrowser-vm.tar.gz
