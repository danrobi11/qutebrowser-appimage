name: Build qutebrowser Portable Binary

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 python3-pip python3-venv wget patchelf
          # Ensure full home directory access
          mkdir -p ~/qutebrowser-portable-build

      - name: Determine Python version and verify lib-dynload
        id: python-version
        run: |
          PYTHON_VERSION=$(python3 --version | cut -d' ' -f2 | cut -d'.' -f1,2)
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV
          SYSTEM_LIB_DYNLOAD="/usr/lib/python${PYTHON_VERSION}/lib-dynload"
          if [ -d "$SYSTEM_LIB_DYNLOAD" ]; then
            echo "System lib-dynload found at $SYSTEM_LIB_DYNLOAD"
          else
            echo "Error: System lib-dynload not found at $SYSTEM_LIB_DYNLOAD"
            find "/usr/lib/python${PYTHON_VERSION}" -type d
            exit 1
          fi

      - name: Build portable qutebrowser
        run: |
          # Set up directories
          mkdir -p qutebrowser-portable/bin qutebrowser-portable/lib qutebrowser-portable/Qt/plugins qutebrowser-portable/Qt/libexec
          WORKDIR="$HOME/qutebrowser-portable-build"
          mkdir -p "$WORKDIR"
          
          # Clone and build qutebrowser
          git clone https://github.com/qutebrowser/qutebrowser.git "$WORKDIR/qutebrowser-source"
          cd "$WORKDIR/qutebrowser-source"
          git checkout v3.2.0
          python3 -m venv "$WORKDIR/venv"
          source "$WORKDIR/venv/bin/activate"
          pip install setuptools wheel
          pip install -r requirements.txt -r misc/requirements/requirements-pyqt.txt
          pip install . --prefix="$HOME/qutebrowser-portable" --no-deps
          deactivate

          # Bundle Python and qutebrowser
          cp "$WORKDIR/venv/bin/python3" "$HOME/qutebrowser-portable/bin/"
          mkdir -p "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}"
          cp -r "$WORKDIR/venv/lib/python${{ env.PYTHON_VERSION }}/site-packages" "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/"
          cp -r "/usr/lib/python${{ env.PYTHON_VERSION }}"/* "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/"
          cp -r "/usr/lib/python${{ env.PYTHON_VERSION }}/lib-dynload" "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/"

          # Bundle glibc, linker, and core libs
          PYTHON_BIN="$HOME/qutebrowser-portable/bin/python3"
          cp /lib/x86_64-linux-gnu/libc.so.6 "$HOME/qutebrowser-portable/lib/"
          cp /lib64/ld-linux-x86-64.so.2 "$HOME/qutebrowser-portable/lib/"
          for lib in $(ldd "$PYTHON_BIN" | grep -o '/usr/lib/[^ ]*' | sort -u); do
            cp "$lib" "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy $lib"
          done
          cp /usr/lib/x86_64-linux-gnu/libm.so.6 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy libm.so.6"
          cp /usr/lib/x86_64-linux-gnu/libz.so.1 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy libz.so.1"
          cp /usr/lib/x86_64-linux-gnu/libexpat.so.1 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy libexpat.so.1"
          cp /lib/x86_64-linux-gnu/libbz2.so.1.0 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy libbz2.so.1.0"
          cp /usr/lib/x86_64-linux-gnu/liblzma.so.5 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy liblzma.so.5"

          # Bundle Qt6 and PyQt6 dependencies comprehensively
          PYQT6_MOD="$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/site-packages/PyQt6/QtCore.abi3.so"
          if [ -f "$PYQT6_MOD" ]; then
            for lib in $(ldd "$PYQT6_MOD" | grep -o '/usr/lib/[^ ]*' | sort -u); do
              cp "$lib" "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy $lib"
            done
            # Bundle transitive Qt6 dependencies
            QT6_CORE="/usr/lib/x86_64-linux-gnu/libQt6Core.so.6"
            for lib in $(ldd "$QT6_CORE" | grep -o '/usr/lib/[^ ]*' | sort -u); do
              cp "$lib" "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy $lib"
            done
          else
            echo "Error: PyQt6 QtCore module not found at $PYQT6_MOD"
            exit 1
          fi
          # Bundle all Qt6 library variants (including versioned files)
          cp -r /usr/lib/x86_64-linux-gnu/libQt6* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libxcb* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libicu* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libfontconfig.so.1 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libfreetype.so.6 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libX11.so.6 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libxkbcommon* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libpulse.so.0 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libnss3.so "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libgbm.so.1 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libdouble-conversion.so.3 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libstdc++.so.6 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libglib-2.0.so.0 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libicui18n.so.* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libicuuc.so.* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libb2.so.1 "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy libb2.so.1"
          # Bundle Qt6 plugins and resources
          cp -r /usr/lib/x86_64-linux-gnu/qt6/plugins/* "$HOME/qutebrowser-portable/Qt/plugins/" || true
          cp -r /usr/lib/x86_64-linux-gnu/qt6/libexec/* "$HOME/qutebrowser-portable/Qt/libexec/" || true

          # Debug: Verify bundled libraries
          echo "Listing bundled libraries in $HOME/qutebrowser-portable/lib:"
          ls -l "$HOME/qutebrowser-portable/lib/" | grep libQt6Core || echo "libQt6Core not found in bundle"

          # Patch RPATH correctly
          patchelf --set-rpath '$ORIGIN/../lib' "$HOME/qutebrowser-portable/bin/python3"
          find "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/site-packages/PyQt6" -name '*.so' -exec patchelf --set-rpath '$ORIGIN/../../../../lib' {} \;

          # Create launcher script with enhanced debugging
          cat << "EOF" > "$HOME/qutebrowser-portable/run.sh"
          #!/bin/bash
          DIR="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="$DIR/lib"
          export PYTHONPATH="$DIR/lib/python${{ env.PYTHON_VERSION }}:$DIR/lib/python${{ env.PYTHON_VERSION }}/site-packages:$DIR/lib/python${{ env.PYTHON_VERSION }}/lib-dynload"
          export LD_DEBUG=libs
          export QT_PLUGIN_PATH="$DIR/Qt/plugins"
          export QTWEBENGINEPROCESS_PATH="$DIR/Qt/libexec/QtWebEngineProcess"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" > "$HOME/qutebrowser-portable.log"
          echo "PYTHONPATH=$PYTHONPATH" >> "$HOME/qutebrowser-portable.log"
          echo "QT_PLUGIN_PATH=$QT_PLUGIN_PATH" >> "$HOME/qutebrowser-portable.log"
          echo "QTWEBENGINEPROCESS_PATH=$QTWEBENGINEPROCESS_PATH" >> "$HOME/qutebrowser-portable.log"
          echo "Running with bundled linker: $DIR/lib/ld-linux-x86-64.so.2" >> "$HOME/qutebrowser-portable.log"
          # Test PyQt6 functionality
          echo "Testing PyQt6 import..." >> "$HOME/qutebrowser-portable.log"
          "$DIR/lib/ld-linux-x86-64.so.2" --library-path "$LD_LIBRARY_PATH" "$DIR/bin/python3" -c "from PyQt6.QtCore import QCoreApplication; app = QCoreApplication([]); print('PyQt6 works')" >> "$HOME/qutebrowser-portable.log" 2>&1
          echo "Launching qutebrowser..." >> "$HOME/qutebrowser-portable.log"
          "$DIR/lib/ld-linux-x86-64.so.2" --library-path "$LD_LIBRARY_PATH" "$DIR/bin/python3" -v "$DIR/bin/qutebrowser" --debug --no-err-windows >> "$HOME/qutebrowser-portable.log" 2>&1
          EXIT_CODE=$?
          echo "Exit code: $EXIT_CODE" >> "$HOME/qutebrowser-portable.log"
          unset LD_DEBUG
          exit $EXIT_CODE
          EOF
          chmod +x "$HOME/qutebrowser-portable/run.sh"

          # Test the launcher in the build environment
          echo "Testing launcher in build environment..."
          "$HOME/qutebrowser-portable/run.sh" || echo "Launcher test failed, check $HOME/qutebrowser-portable.log"

      - name: Package portable directory
        run: |
          tar -czf qutebrowser-portable.tar.gz -C "$HOME" qutebrowser-portable
          mkdir -p artifacts
          mv qutebrowser-portable.tar.gz artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: artifacts/qutebrowser-portable.tar.gz
