name: qutebrowser-portable-binary-main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3.10 \
            libffi8 \
            python3-pyqt5.qtwebengine \
            build-essential \
            patchelf \
            gcc

      - name: Install Qutebrowser and PyQt5 into --target
        run: |
          mkdir -p $HOME/qutebrowser-bundle/usr/lib/python3.10/site-packages
          PYTHONPATH=$HOME/qutebrowser-bundle/usr/lib/python3.10/site-packages \
            python3.10 -m pip install --upgrade --no-deps \
            --target=$HOME/qutebrowser-bundle/usr/lib/python3.10/site-packages \
            qutebrowser pyqt5 pyqtwebengine

      - name: Bundle Qutebrowser binary and dependencies
        run: |
          mkdir -p $HOME/qutebrowser-bundle/usr/{bin,lib,share/applications,lib/python3.10}
          mkdir -p $HOME/qutebrowser-bundle/glibc

          cp "$(which python3.10)" $HOME/qutebrowser-bundle/usr/bin/python3
          chmod +x $HOME/qutebrowser-bundle/usr/bin/python3

      - name: "🧪 Diagnostic: ldd output for bundled python3"
        run: |
          echo "🧪 ldd output for bundled python3:"
          ldd $HOME/qutebrowser-bundle/usr/bin/python3 || true

      - name: Patch interpreter and bundle shared libraries
        run: |
          patchelf --set-interpreter "\$ORIGIN/../glibc/ld-linux-x86-64.so.2" \
            $HOME/qutebrowser-bundle/usr/bin/python3

          ldd "$(which python3.10)" | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read lib; do
            cp -v "$lib" $HOME/qutebrowser-bundle/usr/lib/
          done

          find /usr/lib -name "libpython3.10.so*" -exec cp -v {} $HOME/qutebrowser-bundle/usr/lib/ \;

          stdlib_dir=$(python3.10 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          cp -r "$stdlib_dir"/* $HOME/qutebrowser-bundle/usr/lib/python3.10/

          find /usr/lib -name "libffi.so.8*" -exec cp -v {} $HOME/qutebrowser-bundle/usr/lib/ \;

          cp -v /usr/lib/x86_64-linux-gnu/libstdc++.so.6* $HOME/qutebrowser-bundle/usr/lib/
          cp -v /lib/x86_64-linux-gnu/libgcc_s.so.1 $HOME/qutebrowser-bundle/usr/lib/

      - name: Extract dynamic linker and glibc from Ubuntu 22.04
        run: |
          docker run --rm -v $HOME:/mnt ubuntu:22.04 bash -c "
            apt update && apt install -y libc6
            mkdir -p /mnt/qutebrowser-bundle/glibc

            # Copy ld-linux and all its dependencies
            cp -v /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 /mnt/qutebrowser-bundle/glibc/
            libs=\$(ldd /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 | awk '{print \$3}' | grep '^/')
            for lib in \$libs; do
              cp -v \$lib /mnt/qutebrowser-bundle/glibc/
            done
          "

          # Fix permissions in case Docker sets files as immutable/root-owned
          cp -v $HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2 $HOME/qutebrowser-bundle/glibc/ld-linker
          mv $HOME/qutebrowser-bundle/glibc/ld-linker $HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2
          chmod +x $HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2

      - name: 🔍 Check ldd for ld-linux
        run: |
          echo "🧪 ldd output for glibc/ld-linux:"
          ldd $HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2 || true

      - name: Write and compile fixed C launcher with debug output
        run: |
          cat > $HOME/qutebrowser-bundle/usr/bin/launcher.c <<'EOF'
          #define _GNU_SOURCE
          #include <stdio.h>
          #include <stdlib.h>
          #include <libgen.h>
          #include <limits.h>
          #include <unistd.h>
          #include <string.h>

          int main(int argc, char **argv) {
              char exe_path[PATH_MAX];
              ssize_t len = readlink("/proc/self/exe", exe_path, sizeof(exe_path)-1);
              if (len == -1) {
                  perror("readlink");
                  return 1;
              }
              exe_path[len] = '\0';

              char exe_path_copy[PATH_MAX];
              strncpy(exe_path_copy, exe_path, sizeof(exe_path_copy));
              exe_path_copy[sizeof(exe_path_copy)-1] = '\0';
              char *dir = dirname(exe_path_copy);

              char python_path[PATH_MAX];
              snprintf(python_path, sizeof(python_path), "%s/python3", dir);

              char pythonhome[PATH_MAX];
              snprintf(pythonhome, sizeof(pythonhome), "%s/..", dir);

              char pythonpath[PATH_MAX];
              snprintf(pythonpath, sizeof(pythonpath), "%s/../lib/python3.10/site-packages", dir);

              char ld_path[PATH_MAX];
              snprintf(ld_path, sizeof(ld_path), "%s/../glibc/ld-linux-x86-64.so.2", dir);

              char lib_path[PATH_MAX];
              snprintf(lib_path, sizeof(lib_path), "%s/../lib", dir);

              fprintf(stderr, "🔧 [DEBUG] Executable Path: %s\n", exe_path);
              fprintf(stderr, "🔧 [DEBUG] Python Path:     %s\n", python_path);
              fprintf(stderr, "🔧 [DEBUG] PYTHONHOME:      %s\n", pythonhome);
              fprintf(stderr, "🔧 [DEBUG] PYTHONPATH:      %s\n", pythonpath);
              fprintf(stderr, "🔧 [DEBUG] LD path:         %s\n", ld_path);
              fprintf(stderr, "🔧 [DEBUG] LD_LIBRARY_PATH: %s\n", lib_path);

              setenv("PYTHONHOME", pythonhome, 1);
              setenv("PYTHONPATH", pythonpath, 1);

              char *ld_args[argc + 7];
              int i = 0;
              ld_args[i++] = ld_path;
              ld_args[i++] = "--library-path";
              ld_args[i++] = lib_path;
              ld_args[i++] = python_path;
              ld_args[i++] = "-m";
              ld_args[i++] = "qutebrowser";
              for (int j = 1; j < argc; j++) {
                  ld_args[i++] = argv[j];
              }
              ld_args[i] = NULL;

              fprintf(stderr, "🔧 [DEBUG] Exec args:\n");
              for (int j = 0; j < i; j++) {
                  fprintf(stderr, "  argv[%d] = %s\n", j, ld_args[j]);
              }

              execv(ld_path, ld_args);
              perror("execv via ld-linux failed ❌ (are all glibc deps bundled?)");
              return 1;
          }
          EOF

          gcc -O2 -Wall -static-libgcc -o $HOME/qutebrowser-bundle/usr/bin/qutebrowser $HOME/qutebrowser-bundle/usr/bin/launcher.c
          chmod +x $HOME/qutebrowser-bundle/usr/bin/qutebrowser
          rm $HOME/qutebrowser-bundle/usr/bin/launcher.c

      - name: Final check for linker and content
        run: |
          echo "✅ Checking glibc content..."
          file $HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2
          ls -lh $HOME/qutebrowser-bundle/glibc/
          echo "✅ Done."

      - name: Create .tar.gz archive
        run: |
          cd $HOME
          tar -czvf $GITHUB_WORKSPACE/qutebrowser-portable.tar.gz qutebrowser-bundle

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: ${{ github.workspace }}/qutebrowser-portable.tar.gz
          if-no-files-found: error
