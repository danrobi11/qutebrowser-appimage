name: Build Portable Qutebrowser VM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Install Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y debootstrap qemu-system-x86 qemu-utils libpulse-dev x11-xserver-utils alsa-utils wget

    - name: Create Minimal Ubuntu Chroot
      run: |
        sudo debootstrap --arch=amd64 jammy chroot http://archive.ubuntu.com/ubuntu/
        sudo chroot chroot apt-get update
        sudo chroot chroot apt-get install -y software-properties-common
        sudo chroot chroot add-apt-repository universe
        sudo chroot chroot apt-get update
        sudo chroot chroot apt-get install -y linux-image-generic xserver-xorg-core xinit xserver-xorg-video-all libgl1-mesa-dri xserver-xorg-video-qxl libpulse0 alsa-base alsa-utils wget libfuse2
        # Install Qutebrowser AppImage from danrobi11's repo
        sudo chroot chroot bash -c "wget -O /usr/bin/qutebrowser https://github.com/danrobi11/qutebrowser-appimage/releases/download/3.2.0-x86_64/qutebrowser-3.2.0-x86_64.AppImage"
        sudo chroot chroot chmod +x /usr/bin/qutebrowser
        # Ensure virtio_gpu and 9p modules are included
        sudo chroot chroot bash -c "echo 'virtio_gpu' >> /etc/initramfs-tools/modules"
        sudo chroot chroot bash -c "echo '9p' >> /etc/initramfs-tools/modules"
        sudo chroot chroot bash -c "echo '9pnet' >> /etc/initramfs-tools/modules"
        sudo chroot chroot bash -c "echo '9pnet_virtio' >> /etc/initramfs-tools/modules"
        sudo chroot chroot bash -c "update-initramfs -u"
        sudo chroot chroot apt-get clean
        sudo chroot chroot bash -c "echo 'qutebrowser-vm' > /etc/hostname"
        sudo chroot chroot bash -c "echo '127.0.0.1 localhost qutebrowser-vm' > /etc/hosts"
        sudo chroot chroot bash -c "echo 'root:root' | chpasswd"
        # Create a startup script to launch X and Qutebrowser directly
        sudo chroot chroot bash -c "echo '#!/bin/bash' > /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'set -x' >> /start-qutebrowser.sh"  # Debug output
        sudo chroot chroot bash -c "echo 'echo \"Starting Qutebrowser VM...\"' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'mkdir -p /mnt/host' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'mount -t 9p -o trans=virtio,version=9p2000.L hostshare /mnt/host || echo \"Mount failed\"' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'export DISPLAY=:0' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'export XAUTHORITY=/root/.Xauthority' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'touch /root/.Xauthority' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'hostname qutebrowser-vm' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'startx /usr/bin/qutebrowser --no-sandbox -- :0 vt1 &' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo '# Keep init running to prevent kernel panic' >> /start-qutebrowser.sh"
        sudo chroot chroot bash -c "echo 'while true; do sleep 3600; done' >> /start-qutebrowser.sh"
        sudo chroot chroot chmod +x /start-qutebrowser.sh
        # Configure X11 to use VirtIO GPU with modesetting
        sudo chroot chroot bash -c "mkdir -p /etc/X11/xorg.conf.d"
        sudo chroot chroot bash -c "echo 'Section \"Device\"' > /etc/X11/xorg.conf.d/10-virtio.conf"
        sudo chroot chroot bash -c "echo '  Identifier \"VirtIO GPU\"' >> /etc/X11/xorg.conf.d/10-virtio.conf"
        sudo chroot chroot bash -c "echo '  Driver \"modesetting\"' >> /etc/X11/xorg.conf.d/10-virtio.conf"
        sudo chroot chroot bash -c "echo '  Option \"AccelMethod\" \"glamor\"' >> /etc/X11/xorg.conf.d/10-virtio.conf"
        sudo chroot chroot bash -c "echo 'EndSection' >> /etc/X11/xorg.conf.d/10-virtio.conf"
        # Configure audio
        sudo chroot chroot bash -c "mkdir -p /etc/alsa/conf.d"
        sudo chroot chroot bash -c "echo 'pcm.!default { type hw card 0 }' > /etc/alsa/conf.d/99-virtio.conf"

    - name: Package VM Components
      run: |
        sudo cp chroot/boot/vmlinuz-* kernel
        sudo cp chroot/boot/initrd.img-* initrd
        echo "Chroot size:"
        sudo du -sh chroot
        sudo dd if=/dev/zero of=filesystem.img bs=1M count=4096
        sudo mkfs.ext4 -F filesystem.img
        sudo mkdir /mnt/chroot
        sudo mount -o loop filesystem.img /mnt/chroot
        sudo cp -a chroot/* /mnt/chroot/
        sudo umount /mnt/chroot
        sudo tar -czf qutebrowser-vm.tar.gz kernel initrd filesystem.img
        ls -lh kernel initrd filesystem.img qutebrowser-vm.tar.gz

    - name: Create Simple Run Script
      run: |
        cat > run-qutebrowser-vm.sh << 'EOF'
        #!/bin/bash
        set -e

        QEMU_BIN="qemu-system-x86_64"
        SPICE_BIN="spicy"

        # Check for QEMU
        command -v "$QEMU_BIN" >/dev/null 2>&1 || {
          echo "Error: $QEMU_BIN not found."
          echo "Please install QEMU first (e.g., 'sudo xbps-install -S qemu' on Void)."
          exit 1
        }

        # Check for spicy
        command -v "$SPICE_BIN" >/dev/null 2>&1 || {
          echo "Error: $SPICE_BIN not found."
          echo "Please install spice-gtk (e.g., 'sudo xbps-install -S spice-gtk' on Void)."
          exit 1
        }

        SCRIPT_DIR="$(dirname "$(readlink -f "$0")")"
        KERNEL="$SCRIPT_DIR/kernel"
        INITRD="$SCRIPT_DIR/initrd"
        FS="$SCRIPT_DIR/filesystem.img"

        [ -f "$KERNEL" ] && [ -f "$INITRD" ] && [ -f "$FS" ] || {
          echo "Error: Missing VM components (kernel, initrd, or filesystem.img)."
          exit 1
        }

        HOST_SHARE="$HOME"
        GUEST_MOUNT="/mnt/host"
        echo "Sharing your home directory ($HOST_SHARE) at $GUEST_MOUNT in Qutebrowser."
        echo "Open files with 'file://$GUEST_MOUNT/path/to/file' (e.g., 'file:///mnt/host/Documents/test.html')."
        echo "Starting Qutebrowser VM with SPICE display on port 5900..."

        QEMU_ARGS=(
          -kernel "$KERNEL"
          -initrd "$INITRD"
          -drive "file=$FS,format=raw,if=virtio"
          -append "root=/dev/vda console=ttyS0 rw init=/start-qutebrowser.sh"
          -m 1G
          -cpu host
          -enable-kvm
          -virtfs "local,path=$HOST_SHARE,mount_tag=hostshare,security_model=none"
          -vga virtio
          -spice "port=5900,addr=127.0.0.1,disable-ticketing=on"
          -serial mon:stdio
          -device virtio-vga
          -device "virtio-sound,audiodev=snd0"
          -audiodev "spice,id=snd0"
        )

        # Start QEMU in the background
        "$QEMU_BIN" "${QEMU_ARGS[@]}" &
        QEMU_PID=$!

        # Give QEMU a moment to start the SPICE server
        sleep 2

        # Start spicy to connect to the SPICE display
        "$SPICE_BIN" -h 127.0.0.1 -p 5900 &
        SPICE_PID=$!

        # Trap to clean up both processes on exit
        trap 'kill $QEMU_PID $SPICE_PID 2>/dev/null' EXIT

        # Wait for QEMU to finish
        wait $QEMU_PID
        EOF
        chmod +x run-qutebrowser-vm.sh

    - name: Bundle Package
      run: |
        sudo tar -czf qutebrowser-vm.tar.gz kernel initrd filesystem.img run-qutebrowser-vm.sh
        echo "--- Package Contents ---"
        sudo tar -tvf qutebrowser-vm.tar.gz
        echo "------------------------"
        ls -lh qutebrowser-vm.tar.gz
        tar -ztvf qutebrowser-vm.tar.gz | awk '{sum+=$3} END {printf "Estimated Uncompressed Size: %.2f MB\n", sum/1024/1024}'

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-vm
        path: qutebrowser-vm.tar.gz
