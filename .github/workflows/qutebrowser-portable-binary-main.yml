name: Build Qutebrowser Portable Binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential qtbase5-dev qtwebengine5-dev \
            python3 python3-pyqt5 python3-pyqt5.qtwebengine \
            python3-pyqt5.qtsvg python3-pyqt5.qtwebchannel \
            python3-pip git curl wget zip patchelf \
            libx11-dev libgl1 libglib2.0-dev

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            jinja2 pygments qtpy qtawesome \
            qutebrowser

      - name: Create qutebrowser launcher
        run: |
          mkdir -p ~/qutebrowser-bundle/usr/bin
          cp "$(which qutebrowser)" ~/qutebrowser-bundle/usr/bin/qutebrowser-bin
          chmod +w ~/qutebrowser-bundle/usr/bin/qutebrowser-bin

      - name: Bundle required libraries
        run: |
          cd ~/qutebrowser-bundle
          mkdir -p usr/lib
          ldd usr/bin/qutebrowser-bin | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read lib; do
            echo "Copying $lib"
            cp -v "$lib" usr/lib/ || { echo "Error copying $lib"; exit 1; }
          done
          cp -v /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 usr/lib/ || { echo "Missing linker"; exit 1; }

      - name: Patch RPATH for portability
        run: |
          patchelf --force-rpath --set-rpath \$ORIGIN/../lib ~/qutebrowser-bundle/usr/bin/qutebrowser-bin
          readelf -d ~/qutebrowser-bundle/usr/bin/qutebrowser-bin | grep RPATH

      - name: Create launcher wrapper
        run: |
          cat > ~/qutebrowser-bundle/usr/bin/qutebrowser << EOF
          #!/bin/bash
          DIR="\$(dirname "\$(realpath "\$0")")"
          "\$DIR/../lib/ld-linux-x86-64.so.2" --library-path "\$DIR/../lib" "\$DIR/qutebrowser-bin" "\$@"
          EOF
          chmod +x ~/qutebrowser-bundle/usr/bin/qutebrowser
          cat ~/qutebrowser-bundle/usr/bin/qutebrowser

      - name: Package bundle
        run: |
          cd ~/qutebrowser-bundle
          zip -r ~/qutebrowser-portable.zip .

      - name: Generate SHA256 checksum
        run: |
          sha256sum ~/qutebrowser-portable.zip > ~/qutebrowser-portable.zip.sha256
          cat ~/qutebrowser-portable.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: |
            ~/qutebrowser-portable.zip
            ~/qutebrowser-portable.zip.sha256
