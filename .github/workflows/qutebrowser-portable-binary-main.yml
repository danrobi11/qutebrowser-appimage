name: qutebrowser-portable-binary-main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3.10 \
            python3-pip \
            python3-setuptools \
            libffi8 \
            libqt5webenginecore5 \
            libqt5webenginewidgets5 \
            libqt5widgets5 \
            libqt5gui5 \
            libqt5core5a \
            build-essential \
            patchelf \
            gcc \
            wget

      - name: Install Qutebrowser and PyQt5 via pip (user local)
        run: |
          python3.10 -m pip install --upgrade --no-cache-dir --user qutebrowser pyqt5 pyqtwebengine
          python3.10 -m pip show qutebrowser || exit 1

      - name: Copy installed site-packages to bundle
        run: |
          SITEPKG="$(python3.10 -c 'import site; print(site.getusersitepackages())')"
          echo "Site-packages: $SITEPKG"
          mkdir -p "$HOME/qutebrowser-bundle/usr/lib/python3.10/site-packages"
          cp -rv "$SITEPKG"/* "$HOME/qutebrowser-bundle/usr/lib/python3.10/site-packages"

      - name: Bundle Python binary and core libs
        run: |
          mkdir -p "$HOME/qutebrowser-bundle/usr/bin" "$HOME/qutebrowser-bundle/usr/lib" "$HOME/qutebrowser-bundle/usr/lib/python3.10" "$HOME/qutebrowser-bundle/glibc"
          cp "$(which python3.10)" "$HOME/qutebrowser-bundle/usr/bin/python3"
          chmod +x "$HOME/qutebrowser-bundle/usr/bin/python3"
          stdlib_dir=$(python3.10 -c "import sysconfig; print(sysconfig.get_path('stdlib'))")
          cp -r "$stdlib_dir"/* "$HOME/qutebrowser-bundle/usr/lib/python3.10/"

      - name: Patch interpreter and bundle all shared libraries recursively
        run: |
          patchelf --set-interpreter "\$ORIGIN/../glibc/ld-linux-x86-64.so.2" "$HOME/qutebrowser-bundle/usr/bin/python3"
          # Function to copy library and its dependencies recursively
          copy_deps() {
            local lib="$1"
            local dest="$2"
            [ ! -f "$lib" ] && return
            cp -v "$lib" "$dest/"
            ldd "$lib" | grep -o '/[^ ]*\.so[^ ]*' | while read dep; do
              if [ -f "$dep" ] && [ ! -f "$dest/$(basename "$dep")" ]; then
                copy_deps "$dep" "$dest"
              fi
            done
          }
          # Bundle Python dependencies
          ldd "$(which python3.10)" | grep -o '/[^ ]*\.so[^ ]*' | while read lib; do
            copy_deps "$lib" "$HOME/qutebrowser-bundle/usr/lib"
          done
          # Bundle Qt and PyQt dependencies
          for lib in libQt5Core libQt5Gui libQt5Widgets libQt5WebEngineCore libQt5WebEngineWidgets; do
            find /usr/lib -name "${lib}.so*" -exec cp -v {} "$HOME/qutebrowser-bundle/usr/lib/" \;
          done
          # Additional critical libs
          cp -v /usr/lib/x86_64-linux-gnu/libstdc++.so.6* "$HOME/qutebrowser-bundle/usr/lib/"
          cp -v /lib/x86_64-linux-gnu/libgcc_s.so.1 "$HOME/qutebrowser-bundle/usr/lib/"
          cp -v /usr/lib/x86_64-linux-gnu/libpthread.so.0 "$HOME/qutebrowser-bundle/usr/lib/"

      - name: Extract dynamic linker and glibc from Ubuntu 22.04
        run: |
          docker run --rm -v "$HOME:/mnt" ubuntu:22.04 bash -c '
            apt update && apt install -y libc6
            ldpath="/mnt/qutebrowser-bundle/glibc"
            mkdir -p "$ldpath"
            cp -v /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 "$ldpath/"
            ldd /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 | awk '"'"'{print $3}'"'"' | grep "^/" | while read lib; do
              cp -v "$lib" "$ldpath/"
            done
          '
          chmod +x "$HOME/qutebrowser-bundle/glibc/ld-linux-x86-64.so.2"

      - name: Write shell launcher
        run: |
          cat > "$HOME/qutebrowser-bundle/usr/bin/qutebrowser" <<'EOF'
          #!/bin/bash
          DIR="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$DIR/../lib:$LD_LIBRARY_PATH"
          export PYTHONHOME="$DIR/.."
          export PYTHONPATH="$DIR/../lib/python3.10/site-packages"
          exec "$DIR/../glibc/ld-linux-x86-64.so.2" --library-path "$DIR/../lib" "$DIR/python3" -m qutebrowser "$@"
          EOF
          chmod +x "$HOME/qutebrowser-bundle/usr/bin/qutebrowser"

      - name: Verify bundle contents
        run: |
          ls -lh "$HOME/qutebrowser-bundle/usr/lib/"
          du -sh "$HOME/qutebrowser-bundle/"* || true
          find "$HOME/qutebrowser-bundle" | wc -l || true

      - name: Create .tar.gz archive
        run: |
          cd "$HOME"
          tar -czvf "$GITHUB_WORKSPACE/qutebrowser-portable.tar.gz" qutebrowser-bundle

      - name: Generate SHA256 checksum
        run: |
          sha256sum "$GITHUB_WORKSPACE/qutebrowser-portable.tar.gz" > "$GITHUB_WORKSPACE/qutebrowser-portable.tar.gz.sha256"
          cat "$GITHUB_WORKSPACE/qutebrowser-portable.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: ${{ github.workspace }}/qutebrowser-portable.tar.gz
          if-no-files-found: error
