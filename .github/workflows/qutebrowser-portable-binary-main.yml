name: Qutebrowser Portable Binary

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Manual trigger for Qutebrowser portable binary build'
        required: false
        default: 'start'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 python3-pip python3-setuptools \
            python3-pyqt5 python3-pyqt5.qtwebengine \
            qtbase5-dev qtwebengine5-dev libqt5svg5-dev

      - name: Install Qutebrowser with pip
        run: |
          pip install --prefix=$HOME/.local qutebrowser

      - name: Create portable bundle structure
        run: |
          mkdir -p $HOME/qutebrowser-bundle/usr/{bin,lib,share/applications}

          # Copy Python binary
          cp "$(which python3)" $HOME/qutebrowser-bundle/usr/bin/python3
          chmod +x $HOME/qutebrowser-bundle/usr/bin/python3

          # Copy shared libs used by Python
          ldd "$(which python3)" | grep -o '/[^ ]*\.so[^ ]*' | sort -u | while read lib; do
            echo "Copying $lib"
            cp -v "$lib" $HOME/qutebrowser-bundle/usr/lib/
          done

          # Copy linker
          cp -v /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 $HOME/qutebrowser-bundle/usr/lib/

          # Copy site-packages (Qutebrowser + deps)
          cp -r $HOME/.local/lib/python3*/site-packages $HOME/qutebrowser-bundle/usr/lib/

      - name: Create AppRun launcher
        run: |
          cat > $HOME/qutebrowser-bundle/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PYTHONPATH="$HERE/usr/lib/site-packages"
          exec "$HERE/usr/bin/python3" -m qutebrowser "$@"
          EOF

          chmod +x $HOME/qutebrowser-bundle/AppRun

      - name: List bundle contents
        run: |
          echo "Bundle created at: $HOME/qutebrowser-bundle"
          find $HOME/qutebrowser-bundle

      - name: Upload bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: ~/qutebrowser-bundle
