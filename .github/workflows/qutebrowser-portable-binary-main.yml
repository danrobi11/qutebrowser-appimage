name: Build qutebrowser with QEMU and glibc static #2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          wget \
          xz-utils \
          python3-dev \
          python3-pip \
          python2 \
          ninja-build \
          gperf \
          pkg-config \
          qemu-user \
          g++-10
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-10 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-10 100
        sudo update-alternatives --install /usr/bin/python python /usr/bin/python2 100

    - name: Install Python dependencies
      run: |
        pip3 install --user setuptools pyqt5

    - name: Download and build minimal static Qt
      run: |
        wget https://download.qt.io/archive/qt/5.15/5.15.2/single/qt-everywhere-src-5.15.2.tar.xz
        tar xf qt-everywhere-src-5.15.2.tar.xz
        cd qt-everywhere-src-5.15.2
        ./configure -static -prefix /opt/qt-static -opensource -confirm-license \
          -release -optimize-size -no-opengl -no-dbus -no-icu -no-fontconfig \
          -no-feature-dbus -no-feature-fontconfig -no-feature-cups \
          -skip qt3d -skip qtmultimedia -skip qtscript -skip qtsvg -skip qttools \
          -qt-xcb -qt-zlib -qt-libpng -qt-libjpeg -qt-freetype -qt-harfbuzz \
          -no-feature-xcb-glx -no-feature-xcb-sm
        make -j$(nproc)
        sudo make install
        cat config.summary
        [ -f config.log ] && tail -n 50 config.log || true
        rm -rf qt-everywhere-src-5.15.2

    - name: Build minimal static FFmpeg
      run: |
        git clone --depth 1 --branch n4.4.4 https://git.ffmpeg.org/ffmpeg.git
        cd ffmpeg
        ./configure --enable-static --disable-shared --prefix=/opt/ffmpeg-static \
          --disable-programs --disable-doc --disable-everything \
          --enable-decoder=h264 --enable-decoder=vp9 --enable-decoder=aac \
          --enable-demuxer=mp4 --enable-demuxer=flv --enable-demuxer=hls \
          --enable-protocol=file --enable-protocol=http --enable-protocol=https \
          --enable-muxer=mp4 --enable-encoder=aac --enable-libx264
        make -j$(nproc)
        sudo make install
        rm -rf ffmpeg

    - name: Clone and build qutebrowser
      run: |
        git clone --depth 1 --branch v2.5.4 https://github.com/qutebrowser/qutebrowser.git
        cd qutebrowser
        python3 setup.py build --qt-dir=/opt/qt-static --ffmpeg-dir=/opt/ffmpeg-static
        g++ -static -o qutebrowser-static $(find build -name "*.o") \
          -L/opt/qt-static/lib -L/opt/ffmpeg-static/lib \
          -lQt5WebEngine -lQt5WebEngineCore -lQt5Quick -lQt5Gui -lQt5Core \
          -lX11 -lX11-xcb -lxcb -lxcb-util -lxcb-keysyms -lxcb-icccm -lxcb-randr \
          -lxcb-xkb -lxcb-xinerama -lxcb-shape -lxcb-sync -lxcb-render-util -lxcb-image \
          -lavcodec -lavformat -lavutil -lswscale
        strip --strip-unneeded qutebrowser-static

    - name: Create run script
      run: |
        cat > run-qutebrowser.sh << 'EOF'
        #!/bin/bash
        QUTEBROWSER_STATIC="$(dirname "$0")/qutebrowser-static"
        QEMU_X86_64="$(dirname "$0")/qemu-x86_64"
        if [ -z "$DISPLAY" ] && [ -z "$WAYLAND_DISPLAY" ]; then
          echo "Error: No graphical environment detected."
          exit 1
        fi
        X11_ARGS=""
        if [ -n "$DISPLAY" ]; then
          DISPLAY="${DISPLAY:-:0}"
          X11_ARGS="-E DISPLAY=$DISPLAY -v /tmp/.X11-unix:/tmp/.X11-unix"
          echo "Running on X11 with DISPLAY=$DISPLAY"
        elif [ -n "$WAYLAND_DISPLAY" ]; then
          WAYLAND_ARGS="-E WAYLAND_DISPLAY=$WAYLAND_DISPLAY -v $XDG_RUNTIME_DIR:/tmp/wayland"
          echo "Running on Wayland with WAYLAND_DISPLAY=$WAYLAND_DISPLAY"
        fi
        # Detect host audio and video group IDs
        AUDIO_GID=$(getent group audio | cut -d: -f3)
        VIDEO_GID=$(getent group video | cut -d: -f3)
        HOME_ARGS="-E HOME=$HOME -v $HOME:$HOME"
        AUDIO_VIDEO_ARGS="-E AUDIO_GID=$AUDIO_GID -E VIDEO_GID=$VIDEO_GID"
        chmod +x "$QEMU_X86_64" "$QUTEBROWSER_STATIC" 2>/dev/null
        "$QEMU_X86_64" $X11_ARGS $WAYLAND_ARGS $HOME_ARGS $AUDIO_VIDEO_ARGS "$QUTEBROWSER_STATIC" "$@"
        EOF
        chmod +x run-qutebrowser.sh

    - name: Bundle package
      run: |
        cp /usr/bin/qemu-x86_64 .
        tar -czf qutebrowser-qemu.tar.gz qutebrowser-static qemu-x86_64 run-qutebrowser.sh
        du -sh qutebrowser-qemu.tar.gz
        tar -tvf qutebrowser-qemu.tar.gz | awk '{sum += $3} END {print "Uncompressed size: " sum/1024/1024 " MB"}'

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: qutebrowser-qemu
        path: qutebrowser-qemu.tar.gz
