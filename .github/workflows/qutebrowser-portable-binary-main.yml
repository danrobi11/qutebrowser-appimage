name: qutebrowser-podman-x11

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt update
          sudo apt install -y podman

      - name: Create Containerfile
        run: |
          cat > Containerfile <<'EOF'
          FROM ubuntu:22.04

          # Set up environment
          ENV DEBIAN_FRONTEND=noninteractive

          # Install all dependencies
          RUN apt update && apt install -y \
              python3.10 \
              python3-pip \
              python3-setuptools \
              libffi8 \
              # Qt and WebEngine core
              libqt5webenginecore5 \
              libqt5webenginewidgets5 \
              libqt5widgets5 \
              libqt5gui5 \
              libqt5core5a \
              libqt5opengl5 \
              libqt5network5 \
              libqt5dbus5 \
              libqt5printsupport5 \
              libqt5qml5 \
              libqt5qmlmodels5 \
              libqt5quick5 \
              libqt5quickwidgets5 \
              libqt5webchannel5 \
              # Graphics and X11 dependencies
              libgl1 \
              libegl1 \
              libxkbcommon0 \
              libfontconfig1 \
              libx11-6 \
              libx11-xcb1 \
              libxcb1 \
              libxcb-glx0 \
              libxcb-icccm4 \
              libxcb-image0 \
              libxcb-keysyms1 \
              libxcb-randr0 \
              libxcb-render0 \
              libxcb-render-util0 \
              libxcb-shape0 \
              libxcb-shm0 \
              libxcb-sync1 \
              libxcb-xfixes0 \
              libxcb-xinerama0 \
              libxcb-xkb1 \
              libxext6 \
              libxfixes3 \
              libxrender1 \
              libgl1-mesa-dri \
              libglx-mesa0 \
              # Audio/Video for WebEngine
              libasound2 \
              libpulse0 \
              # Fonts and misc
              fontconfig \
              libfreetype6 \
              libpng16-16 \
              libjpeg8 \
              libdouble-conversion3 \
              libicu70 \
              libpcre2-8-0 \
              libzstd1 \
              zlib1g \
              # GLIBC and runtime
              libc6 \
              libgcc-s1 \
              libstdc++6 \
              && rm -rf /var/lib/apt/lists/*

          # Install qutebrowser and Python dependencies, suppress root warning
          RUN pip3 install --no-cache-dir --root-user-action=ignore \
              qutebrowser \
              pyqt5 \
              pyqtwebengine \
              jinja2 \
              markupsafe \
              pyyaml

          # Create group and user (UID/GID 1000 for host alignment)
          RUN groupadd -g 1000 user && \
              useradd -m -u 1000 -g 1000 user

          # Set runtime user
          USER user
          WORKDIR /home/user

          # Entrypoint
          CMD ["python3", "-m", "qutebrowser"]
          EOF

      - name: Build Podman Container
        run: |
          podman build -t qutebrowser-x11:latest -f Containerfile .
          podman images

      - name: Save Container Image
        run: |
          podman save -o qutebrowser-x11.tar qutebrowser-x11:latest

      - name: Generate SHA256 Checksum
        run: |
          sha256sum qutebrowser-x11.tar > qutebrowser-x11.tar.sha256
          cat qutebrowser-x11.tar.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-x11-podman
          path: qutebrowser-x11.tar
          if-no-files-found: error
