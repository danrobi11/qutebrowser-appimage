name: Build qutebrowser Portable Binary

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3 python3-dev python3-pip python3-venv \
            qt6-base-dev qt6-webengine-dev qt6-tools-dev libqt6webenginecore6 libqt6webenginewidgets6 \
            libx11-dev libxext-dev libxkbcommon-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfontconfig1-dev libfreetype-dev libasound2-dev libnss3-dev libglib2.0-dev \
            libpcre2-dev libjpeg-dev libpng-dev libicu-dev libxslt1-dev \
            python3-pyqt6 python3-pyqt6.qtsvg python3-pyqt6.qtwebengine \
            libmysqlclient-dev libqt63drender6 libqt6webview6 libqt63dquickscene2d6 \
            libgl1 libegl1 libopengl0 libglx0 libx11-xcb1 libxcb-glx0 libgbm1 libdrm2 libxcb-dri3-0 libxshmfence1 \
            libpcsclite1 libpulse0 libxcb-cursor0 wget

      - name: Determine Python version
        id: python-version
        run: |
          PYTHON_VERSION=$(python3 --version | cut -d' ' -f2 | cut -d'.' -f1,2)
          echo "PYTHON_VERSION=$PYTHON_VERSION" >> $GITHUB_ENV

      - name: Build portable qutebrowser
        run: |
          # Set up directories
          mkdir -p qutebrowser-portable/bin qutebrowser-portable/lib
          WORKDIR="$HOME/qutebrowser-portable-build"
          mkdir -p "$WORKDIR"
          
          # Clone and build qutebrowser
          git clone https://github.com/qutebrowser/qutebrowser.git "$WORKDIR/qutebrowser-source"
          cd "$WORKDIR/qutebrowser-source"
          git checkout v3.2.0
          python3 -m venv "$WORKDIR/venv"
          source "$WORKDIR/venv/bin/activate"
          pip install setuptools
          pip install -r requirements.txt -r misc/requirements/requirements-pyqt.txt
          pip install . --prefix="$HOME/qutebrowser-portable" --no-deps
          deactivate

          # Bundle Python and qutebrowser
          cp "$WORKDIR/venv/bin/python3" "$HOME/qutebrowser-portable/bin/"
          cp -r "$WORKDIR/venv/lib/python${{ env.PYTHON_VERSION }}" "$HOME/qutebrowser-portable/lib/"
          # Ensure full stdlib is copied
          cp -r /usr/lib/python${{ env.PYTHON_VERSION}}/* "$HOME/qutebrowser-portable/lib/python${{ env.PYTHON_VERSION }}/" || true

          # Bundle glibc and core libs
          cp /lib/x86_64-linux-gnu/libc.so.6 "$HOME/qutebrowser-portable/lib/"
          cp /lib/x86_64-linux-gnu/ld-linux-x86-64.so.2 "$HOME/qutebrowser-portable/lib/"
          for lib in $(ldd "$HOME/qutebrowser-portable/bin/python3" | grep -o '/usr/lib/[^ ]*'); do
            cp "$lib" "$HOME/qutebrowser-portable/lib/" || echo "Failed to copy $lib"
          done
          cp /usr/lib/x86_64-linux-gnu/libQt6* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libxcb* "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libpulse.so.0 "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libnss3.so "$HOME/qutebrowser-portable/lib/" || true
          cp /usr/lib/x86_64-linux-gnu/libgbm.so.1 "$HOME/qutebrowser-portable/lib/" || true

          # Create launcher script with PYTHONHOME and debug log
          cat << "EOF" > "$HOME/qutebrowser-portable/run.sh"
          #!/bin/bash
          DIR="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          export PYTHONHOME="$DIR/lib/python${{ env.PYTHON_VERSION }}"
          exec "$DIR/bin/python3" "$DIR/bin/qutebrowser" > "$HOME/qutebrowser-portable.log" 2>&1
          EOF
          chmod +x "$HOME/qutebrowser-portable/run.sh"

      - name: Package portable directory
        run: |
          tar -czf qutebrowser-portable.tar.gz -C "$HOME" qutebrowser-portable
          mkdir -p artifacts
          mv qutebrowser-portable.tar.gz artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qutebrowser-portable
          path: artifacts/qutebrowser-portable.tar.gz
